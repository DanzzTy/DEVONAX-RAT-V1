<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX • Global Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

:root{
--bg:#070707;
--card:#131313;
--border:#2d2d2d;
--red:#ff2b2b;
--text:#fff;
--sub:#9a9a9a;
}

body{
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#ff000015,transparent 40%),
radial-gradient(circle at bottom right,#ff000015,transparent 40%);
pointer-events:none;
}

header{
height:72px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
border-bottom:1px solid var(--border);
background:#101010;
z-index:10;
}

.iconBtn{
width:48px;
height:48px;
display:flex;
align-items:center;
justify-content:center;
background:#181818;
border:1px solid var(--border);
border-radius:16px;
cursor:pointer;
}

.logo{
text-align:center;
}

.logo h2{
font-size:18px;
letter-spacing:3px;
}

.logo p{
font-size:11px;
color:#53ff7b;
margin-top:3px;
}

#chatBox{
flex:1;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:82%;
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:12px;
}

.message.self{
align-self:flex-end;
border-color:#ff3030;
}

.sender{
font-size:11px;
color:#ff6b6b;
margin-bottom:6px;
}

.text{
font-size:13px;
line-height:20px;
word-break:break-word;
}

.time{
font-size:10px;
color:#888;
text-align:right;
margin-top:8px;
}

.footer{
padding:15px;
display:flex;
gap:10px;
border-top:1px solid var(--border);
background:#101010;
}

#messageInput{
flex:1;
height:55px;
background:#181818;
border:1px solid #333;
border-radius:16px;
padding:0 16px;
color:#fff;
outline:none;
}

#sendBtn{
width:60px;
border:none;
border-radius:16px;
background:linear-gradient(180deg,#ff3535,#a30000);
color:#fff;
cursor:pointer;
}

#sendBtn span{
font-size:24px;
}

</style>

</head>

<body>

<header>

<div class="iconBtn" onclick="history.back()">
<span class="material-symbols-outlined">
arrow_back
</span>
</div>

<div class="logo">
<h2>GLOBAL CHAT</h2>
<p id="onlineText">Menghubungkan...</p>
</div>

<div class="iconBtn">
<span class="material-symbols-outlined">
groups
</span>
</div>

</header>

<div id="chatBox">

<div class="message">

<div class="sender">SYSTEM</div>

<div class="text">
Selamat datang di Global Chat DEVONAX.
</div>

<div class="time">Now</div>

</div>

</div>

<div class="footer">

<input
id="messageInput"
type="text"
placeholder="Ketik pesan...">

<button id="sendBtn">

<span class="material-symbols-outlined">
send
</span>

</button>

</div>

</body>
  </html>
