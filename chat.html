<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX CHAT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Orbitron,sans-serif;
}

body{

background:#080808;
color:#fff;
overflow:hidden;

}

header{

height:65px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 15px;

background:#111;

border-bottom:1px solid #222;

}

.icon{

width:42px;
height:42px;

border-radius:14px;

background:#181818;

display:flex;
justify-content:center;
align-items:center;

font-size:22px;

cursor:pointer;

}

.slider{

display:flex;

width:200vw;

height:calc(100vh - 130px);

transition:.35s;

}

.page{

width:100vw;

overflow:hidden;

display:flex;
flex-direction:column;

}

.chatBox{

flex:1;

overflow-y:auto;

padding:15px;

}

.bubble{

max-width:80%;

background:#171717;

margin-bottom:12px;

padding:12px;

border-radius:18px;

border:1px solid #282828;

}

.me{

margin-left:auto;

background:#290000;

border-color:#ff2020;

}

.name{

display:flex;

align-items:center;

gap:8px;

margin-bottom:6px;

font-size:13px;

font-weight:bold;

}

.role{

padding:2px 8px;

border-radius:20px;

background:#ff2020;

font-size:10px;

color:#fff;

}

.reply{

background:#222;

padding:8px;

border-left:3px solid red;

border-radius:10px;

margin-bottom:8px;

font-size:11px;

}

.msg{

white-space:pre-wrap;

word-break:break-word;

}

.time{

margin-top:8px;

font-size:10px;

color:#888;

text-align:right;

}

.replyBox{

display:none;

background:#181818;

padding:10px;

border-top:1px solid #333;

}

.replyUser{

font-size:12px;

color:#ff4040;

font-weight:bold;

}

.replyText{

font-size:11px;

margin-top:3px;

color:#ccc;

}

.bottom{

display:flex;

gap:8px;

padding:10px;

background:#111;

border-top:1px solid #222;

}

.bottom input{

flex:1;

height:48px;

border:none;

outline:none;

background:#1b1b1b;

color:#fff;

padding:0 15px;

border-radius:15px;

}

.bottom button{

width:48px;
height:48px;

border:none;

border-radius:15px;

background:#ff2020;

color:#fff;

font-size:20px;

}

.emojiBox{

display:none;

height:180px;

overflow:auto;

background:#111;

padding:10px;

}

.emoji{

font-size:26px;

padding:6px;

cursor:pointer;

display:inline-block;

}

.tabs{

display:flex;

height:45px;

}

.tab{

flex:1;

display:flex;

justify-content:center;
align-items:center;

background:#121212;

border-bottom:2px solid #222;

cursor:pointer;

}

.active{

border-bottom:2px solid #ff2020;

}

</style>

</head>

<body>

<header>

<div class="icon" onclick="history.back()">
←
</div>

<b>DEVONAX CHAT</b>

<div class="icon"
onclick="location.href='history.html'">
🕒
</div>

</header>

<div class="tabs">

<div class="tab active"
id="tabGlobal">
GLOBAL
</div>

<div class="tab"
id="tabPrivate">
PRIVATE
</div>

</div>

<div class="slider"
id="slider">

<!-- GLOBAL -->

<div class="page">

<div id="chatBox"
class="chatBox">
</div>

</div>

<!-- PRIVATE -->

<div class="page">

<div id="privateChatBox"
class="chatBox">

<center style="margin-top:50px;color:#777">

Belum ada chat.

</center>

</div>

</div>

</div>

<div id="replyBox"
class="replyBox">

<div id="replyUser"
class="replyUser">
</div>

<div id="replyText"
class="replyText">
</div>

</div>

<div id="emojiBox"
class="emojiBox">
</div>

<div class="bottom">

<button id="emojiBtn">
😀
</button>

<input
id="message"
placeholder="Tulis pesan...">

<button id="sendBtn">
➤
</button>

</div>

<script>

const slider=document.getElementById("slider");

const g=document.getElementById("tabGlobal");

const p=document.getElementById("tabPrivate");

g.onclick=()=>{

slider.style.transform="translateX(0)";

g.classList.add("active");

p.classList.remove("active");

};

p.onclick=()=>{

slider.style.transform="translateX(-100vw)";

p.classList.add("active");

g.classList.remove("active");

};

let startX=0;

slider.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX;

});

slider.addEventListener("touchend",e=>{

let end=e.changedTouches[0].clientX;

if(startX-end>70)p.onclick();

if(end-startX>70)g.onclick();

});

  </script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded,
query,
limitToLast
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

let myUid="";
let myName="";
let myRole="";
let replyData=null;

const chatBox=document.getElementById("chatBox");
const input=document.getElementById("message");

function escapeHtml(t){

return t.replace(/[&<>"']/g,m=>({

"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#39;"

}[m]));

}

onAuthStateChanged(auth,user=>{

if(!user){

location.href="login.html";

return;

}

myUid=user.uid;

myName=user.email.split("@")[0];

myRole="User";

loadChat();

});

function loadChat(){

const q=query(
ref(db,"globalChat"),
limitToLast(100)
);

onChildAdded(q,s=>{

const key=s.key;
const d=s.val();

const div=document.createElement("div");

div.className=
d.uid===myUid
?
"bubble me"
:
"bubble";

div.onclick=()=>{

replyData={

username:d.username,
message:d.message

};

replyBox.style.display="block";

replyUser.innerText="Balas "+d.username;

replyText.innerText=d.message;

};

div.innerHTML=`

<div class="name">

<span>${escapeHtml(d.username)}</span>

<span class="role">

${escapeHtml(d.role)}

</span>

</div>

${d.reply?`

<div class="reply">

<b>${escapeHtml(d.reply.username)}</b><br>

${escapeHtml(d.reply.message)}

</div>

`:""}

<div class="msg">

${escapeHtml(d.message)}

</div>

<div class="time">

${new Date(d.time).toLocaleTimeString("id-ID",{

hour:"2-digit",
minute:"2-digit"

})}

</div>

`;

chatBox.appendChild(div);
enableDelete(div,key,d.uid);

chatBox.scrollTop=chatBox.scrollHeight;

});

}

async function sendMessage(){

const text=input.value.trim();

if(!text) return;

await push(ref(db,"globalChat"),{

uid:myUid,

username:myName,

role:myRole,

message:text,

reply:replyData,

time:Date.now()

});

input.value="";

replyData=null;

replyBox.style.display="none";

}

sendBtn.onclick=sendMessage;

input.onkeydown=e=>{

if(e.key==="Enter"){

sendMessage();

}

};

</script>

<script type="module">

import {
ref,
remove
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

/* ==========================
   EMOJI
========================== */

const emojiList=[
"😀","😁","😂","🤣","😅","😊","😍","🥰","😘","😎",
"🤩","🤔","😴","😭","😡","🥳","😇","🤗","😋","🤤",
"👍","👎","🙏","👏","💪","🔥","❤️","🧡","💛","💚",
"💙","💜","🤍","🖤","💯","🎉","✨","⚡","⭐","💥",
"👀","🤝","👌","🙌","🎮","📱","💻","🚀","🎂","🍕"
];

emojiList.forEach(e=>{

const item=document.createElement("span");

item.className="emoji";

item.innerText=e;

item.onclick=()=>{

message.value+=e;

emojiBox.style.display="none";

message.focus();

};

emojiBox.appendChild(item);

});

emojiBtn.onclick=()=>{

emojiBox.style.display=
emojiBox.style.display=="block"
?"none":"block";

};

/* ==========================
   CANCEL REPLY
========================== */

const cancel=document.createElement("button");

cancel.innerText="Batal";

cancel.style.marginTop="8px";

cancel.onclick=()=>{

replyData=null;

replyBox.style.display="none";

};

replyBox.appendChild(cancel);

/* ==========================
   LONG PRESS DELETE
========================== */

function enableDelete(bubble,key,uid){

if(uid!==myUid)return;

let timer;

bubble.addEventListener("touchstart",()=>{

timer=setTimeout(async()=>{

if(confirm("Hapus pesan ini?")){

await remove(ref(db,"globalChat/"+key));

bubble.remove();

}

},700);

});

bubble.addEventListener("touchend",()=>{

clearTimeout(timer);

});

bubble.addEventListener("touchmove",()=>{

clearTimeout(timer);

});

}

/* ==========================
   HAPUS SEMUA CHAT
========================== */

const clearBtn=document.createElement("button");

clearBtn.innerText="🗑 Hapus Semua";

clearBtn.style.cssText=`
position:fixed;
bottom:80px;
right:15px;
padding:10px 15px;
border:none;
border-radius:15px;
background:#ff2020;
color:#fff;
display:none;
z-index:999;
`;

document.body.appendChild(clearBtn);

/* tampil hanya Developer / Owner */

if(
myRole==="Developer"||
myRole==="Owner"
){

clearBtn.style.display="block";

}

clearBtn.onclick=async()=>{

if(
myRole!=="Developer"&&
myRole!=="Owner"
){

alert("Akses ditolak.");

return;

}

if(!confirm("Hapus semua Global Chat?"))return;

await remove(ref(db,"globalChat"));

chatBox.innerHTML="";

};

</script>
