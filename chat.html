<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX CHAT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Orbitron,sans-serif;
}

body{
background:#090909;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{

height:65px;
display:flex;
align-items:center;
justify-content:center;

background:#101010;
border-bottom:1px solid #333;

font-size:18px;
font-weight:700;
letter-spacing:2px;

}

#chatBox{

flex:1;
overflow:auto;
padding:15px;

display:flex;
flex-direction:column;
gap:12px;

}

.bubble{

max-width:85%;
padding:12px;
border-radius:18px;

background:#181818;

border:1px solid #2d2d2d;

}

.me{

align-self:flex-end;

background:#420000;

border-color:#ff2020;

}

.name{

display:flex;
justify-content:space-between;

margin-bottom:6px;

font-size:11px;

}

.role{

color:#ff6060;

}

.reply{

background:#242424;

padding:8px;

border-left:3px solid #ff2020;

border-radius:10px;

margin-bottom:8px;

font-size:11px;

}

.msg{

font-size:14px;
word-break:break-word;

}

.time{

margin-top:8px;

font-size:10px;

opacity:.6;

text-align:right;

}

#replyBox{

display:none;

background:#181818;

border-top:1px solid #333;

padding:10px;

}

#replyUser{

color:#ff4040;

font-size:12px;

font-weight:bold;

}

#replyText{

margin-top:5px;

font-size:11px;

opacity:.8;

}

#inputArea{

display:flex;

gap:8px;

padding:10px;

background:#111;

border-top:1px solid #333;

}

#message{

flex:1;

background:#1c1c1c;

border:none;

outline:none;

color:white;

padding:12px;

border-radius:15px;

}

button{

width:50px;
height:50px;

border:none;

border-radius:15px;

background:#ff2020;

color:white;

font-size:22px;

}

#emojiBox{

display:none;

background:#161616;

padding:10px;

border-top:1px solid #333;

max-height:150px;

overflow:auto;

}

.emoji{

font-size:25px;

padding:6px;

cursor:pointer;

display:inline-block;

}

</style>
</head>

<body>

<header>

DEVONAX GLOBAL CHAT

</header>

<div id="chatBox"></div>

<div id="replyBox">

<div id="replyUser"></div>

<div id="replyText"></div>

</div>

<div id="emojiBox"></div>

<div id="inputArea">

<button id="emojiBtn">😊</button>

<input
id="message"
placeholder="Tulis pesan..."
autocomplete="off">

<button id="sendBtn">

➤

</button>

  </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
push,
get,
onChildAdded
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

let myUid="";
let myName="";
let myRole="";
let replyData=null;

const chatBox=document.getElementById("chatBox");
const input=document.getElementById("message");
const sendBtn=document.getElementById("sendBtn");

const replyBox=document.getElementById("replyBox");
const replyUser=document.getElementById("replyUser");
const replyText=document.getElementById("replyText");

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="login.html";

return;

}

myUid=user.uid;

const snap=await get(ref(db,"users/"+user.uid));

if(!snap.exists()) return;

const d=snap.val();

myName=d.username||user.email.split("@")[0];
myRole=d.role||"User";

loadChat();

});

function escapeHtml(text){

return String(text||"")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;");

}

function loadChat(){

onChildAdded(ref(db,"globalChat"),(snap)=>{

const key=snap.key;
const d=snap.val();

const bubble=document.createElement("div");

bubble.className=d.uid===myUid?"bubble me":"bubble";

bubble.onclick=()=>{

replyData={

username:d.username,

message:d.message

};

replyBox.style.display="block";

replyUser.innerText="Balas "+d.username;

replyText.innerText=d.message;

};

bubble.innerHTML=`

<div class="name">

<span>${escapeHtml(d.username)}</span>

<span class="role">${escapeHtml(d.role)}</span>

</div>

${d.reply?`

<div class="reply">

<b>${escapeHtml(d.reply.username)}</b><br>

${escapeHtml(d.reply.message)}

</div>

`:''}

<div class="msg">

${escapeHtml(d.message)}

</div>

<div class="time">

${new Date(d.time).toLocaleTimeString("id-ID",{

hour:"2-digit",
minute:"2-digit"

})}

</div>

`;

chatBox.appendChild(bubble);
enableLongPress(
bubble,
key,
d.uid
);

chatBox.scrollTop=chatBox.scrollHeight;

});

}

async function sendMessage(){

const text=input.value.trim();

if(!text) return;

await push(ref(db,"globalChat"),{

uid:myUid,

username:myName,

role:myRole,

message:text,

reply:replyData,

time:Date.now()

});

input.value="";

replyData=null;

replyBox.style.display="none";

input.focus();

}

sendBtn.onclick=sendMessage;

input.addEventListener("keydown",e=>{

if(e.key==="Enter"){

e.preventDefault();

sendMessage();

}

});

</script>

<script type="module">

import{
ref,
remove
}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

// =======================
// EMOJI
// =======================

const emojiBtn=document.getElementById("emojiBtn");
const emojiBox=document.getElementById("emojiBox");

const emojiList=[
"😀","😁","😂","🤣","😊","😍","😘","🥰","😎","🤔",
"😭","😡","👍","🙏","🔥","❤️","💙","💚","💛","🖤",
"💯","🎉","😴","😅","😆","😇","🤩","😋","🥺","👀"
];

emojiList.forEach(e=>{

const span=document.createElement("span");

span.className="emoji";

span.innerText=e;

span.onclick=()=>{

message.value+=e;

emojiBox.style.display="none";

message.focus();

};

emojiBox.appendChild(span);

});

emojiBtn.onclick=()=>{

emojiBox.style.display=
emojiBox.style.display=="block"
?"none":"block";

};

// =======================
// CANCEL REPLY
// =======================

const cancel=document.createElement("button");

cancel.innerText="✕";

cancel.style.marginTop="8px";

cancel.style.width="70px";

cancel.onclick=()=>{

replyData=null;

replyBox.style.display="none";

};

replyBox.appendChild(cancel);

// =======================
// LONG PRESS DELETE
// =======================

function enableLongPress(bubble,key,uid){

if(uid!==myUid)return;

let timer;

bubble.addEventListener("touchstart",()=>{

timer=setTimeout(async()=>{

if(confirm("Hapus pesan ini?")){

await remove(ref(db,"globalChat/"+key));

bubble.remove();

}

},700);

});

bubble.addEventListener("touchend",()=>{

clearTimeout(timer);

});

bubble.addEventListener("touchmove",()=>{

clearTimeout(timer);

});

}

</script>
