<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX | Global Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

:root{
--bg:#070707;
--card:#141414;
--red:#ff2020;
--border:#303030;
--text:#fff;
}

body{
background:var(--bg);
color:#fff;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at top left,#ff000015,transparent 35%),
radial-gradient(circle at bottom right,#ff000010,transparent 35%);
}

.grid{
position:fixed;
inset:0;
opacity:.04;
background-image:
linear-gradient(#ff0000 1px,transparent 1px),
linear-gradient(90deg,#ff0000 1px,transparent 1px);
background-size:40px 40px;
pointer-events:none;
}

header{

height:70px;

display:flex;
align-items:center;
justify-content:space-between;

padding:15px 18px;

border-bottom:1px solid #252525;

background:#111;

}

.back{

width:46px;
height:46px;

display:flex;
justify-content:center;
align-items:center;

background:#181818;

border-radius:14px;

border:1px solid #333;

cursor:pointer;

}

.back span{

font-size:28px;
color:#ff4040;

}

.logo{

text-align:center;

}

.logo h2{

font-size:18px;
letter-spacing:3px;

}

.logo p{

font-size:10px;
opacity:.7;

margin-top:4px;

}

.online{

width:46px;
height:46px;

display:flex;
justify-content:center;
align-items:center;

border-radius:14px;

background:#181818;

border:1px solid #333;

}

.online span{

font-size:24px;
color:#ff4040;

}

.main{

height:calc(100vh - 70px);

display:flex;

flex-direction:column;

padding:15px;

}

.chatBox{

flex:1;

background:#111;

border:1px solid #2d2d2d;

border-radius:20px;

padding:15px;

overflow-y:auto;

display:flex;

flex-direction:column;

gap:12px;

}

.bubble{

background:#1a1a1a;

border:1px solid #343434;

border-radius:18px;

padding:12px;

max-width:85%;

align-self:flex-start;

}

.me{

align-self:flex-end;

background:#300000;

border-color:#ff2020;

}

.name{

font-size:11px;

font-weight:700;

color:#ff6666;

margin-bottom:6px;

}

.msg{

font-size:13px;

line-height:1.5;

word-break:break-word;

}

.time{

font-size:10px;

opacity:.6;

margin-top:8px;

text-align:right;

}

<div id="clearBtn" class="online">

<span class="material-symbols-outlined">
delete
</span>

</div>

<div id="replyBox" style="display:none;background:#1b1b1b;border-left:4px solid #ff2020;padding:10px;border-radius:12px;margin-top:10px;">
<div id="replyUser" style="font-size:12px;color:#ff6666;"></div>
<div id="replyMsg" style="font-size:11px;color:#bbb;"></div>

<div style="margin-top:8px">
<button onclick="cancelReply()"
style="background:#ff2020;border:none;padding:6px 14px;border-radius:8px;color:#fff;">
Batal
</button>
</div>

</div>

.inputArea{

display:flex;

align-items:center;

gap:10px;

margin-top:12px;

}

.inputArea input{

flex:1;

height:52px;

background:#161616;

border:1px solid #333;

border-radius:16px;

padding:0 18px;

color:#fff;

outline:none;

font-size:13px;

}

.inputArea button{

width:55px;
height:52px;

border:none;

border-radius:16px;

background:#ff2020;

color:#fff;

cursor:pointer;

}

.inputArea button span{

font-size:28px;

}

</style>

</head>

<body>

<div class="grid"></div>

<header>

<div id="backBtn" class="back">
<span class="material-symbols-outlined">
arrow_back
</span>
</div>

<div class="logo">
<h2>DEVONAX CHAT</h2>
<p>Global Realtime Chat</p>
</div>

<div class="online">
<span class="material-symbols-outlined">
forum
</span>
</div>

</header>

<div class="main">

<div id="chatBox" class="chatBox">

<!-- Pesan akan muncul di sini -->

</div>

<div class="inputArea">

<input
id="messageInput"
type="text"
maxlength="300"
placeholder="Tulis pesan..."
>

<button id="sendBtn">

<span class="material-symbols-outlined">
send
</span>

</button>

</div>

  </div>

<style>

/* Scroll */

.chatBox::-webkit-scrollbar{
width:6px;
}

.chatBox::-webkit-scrollbar-thumb{
background:#ff2020;
border-radius:20px;
}

.chatBox::-webkit-scrollbar-track{
background:transparent;
}

/* Animasi bubble */

.bubble{
animation:showBubble .25s ease;
}

@keyframes showBubble{

from{
opacity:0;
transform:translateY(12px);
}

to{
opacity:1;
transform:none;
}

}

/* Efek focus */

.inputArea input:focus{

border-color:#ff2020;

box-shadow:0 0 12px rgba(255,32,32,.25);

}

/* Tombol kirim */

.inputArea button{

transition:.25s;

}

.inputArea button:hover{

transform:scale(1.06);

box-shadow:0 0 18px rgba(255,32,32,.4);

}

/* Loading */

.loading{

margin:auto;

text-align:center;

color:#888;

font-size:13px;

}

.loading span{

font-size:38px;

display:block;

margin-bottom:8px;

color:#ff4040;

animation:spin 2s linear infinite;

}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

/* Username */

.name{

display:flex;

justify-content:space-between;

align-items:center;

gap:8px;

}

.role{

padding:3px 8px;

font-size:9px;

border-radius:20px;

background:#2a0000;

border:1px solid #660000;

color:#ff7070;

}

/* Responsif */

@media(max-width:600px){

.logo h2{
font-size:16px;
}

.chatBox{

padding:12px;

}

.bubble{

max-width:92%;

}

.inputArea{

gap:8px;

}

.inputArea input{

height:48px;

font-size:12px;

}

.inputArea button{

width:50px;
height:48px;

}

}

</style>

<script>

// Tombol kembali
document.getElementById("backBtn").onclick=()=>{
history.back();
};

// Loading awal
document.getElementById("chatBox").innerHTML=`
<div class="loading">
<span class="material-symbols-outlined">
forum
</span>
Menghubungkan ke Global Chat...
</div>
`;

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
push,
get,
query,
limitToLast,
onChildAdded,
remove
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",
authDomain:"project-coding-gabut.firebaseapp.com",
databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"project-coding-gabut",
storageBucket:"project-coding-gabut.firebasestorage.app",
messagingSenderId:"234910334669",
appId:"1:234910334669:web:5203c9e9ce22a596f2b384"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

let myUid="";
let myName="User";
let myRole="Member";

const chatBox=document.getElementById("chatBox");
const input=document.getElementById("messageInput");
const sendBtn=document.getElementById("sendBtn");

onAuthStateChanged(auth,async(user)=>{

if(!user){
location.href="../login.html";
return;
}

myUid=user.uid;

const snap=await get(ref(db,"users/"+user.uid));

if(snap.exists()){

const d=snap.val();

myName=d.username||user.email.split("@")[0];
myRole=d.role||"Member";

}

loadChat();

});

function loadChat(){

chatBox.innerHTML="";

const q=query(
ref(db,"globalChat"),
limitToLast(100)
);

onChildAdded(q,(snap)=>{

const d=snap.val();

const bubble=document.createElement("div");

bubble.className=
d.uid===myUid
?
"bubble me"
:
"bubble";

bubble.onclick=()=>{

replyData={

username:d.username,
message:d.message

};

replyBox.style.display="block";
replyUser.innerText="Balas "+d.username;
replyMsg.innerText=d.message;

};

bubble.innerHTML=`

<div class="name">

<span>${d.username}</span>

<span class="role">${d.role}</span>

</div>

${d.reply?`

<div style="
background:#222;
padding:8px;
border-left:3px solid #ff2020;
border-radius:10px;
margin-bottom:8px;
font-size:11px;
">

<b>${d.reply.username}</b><br>

${escapeHtml(d.reply.message)}

</div>

`:''}

<div class="msg">

${escapeHtml(d.message)}

</div>

<div class="time">

${new Date(d.time).toLocaleTimeString("id-ID",{
hour:"2-digit",
minute:"2-digit"
})}

</div>

`;

chatBox.appendChild(bubble);

chatBox.scrollTop=chatBox.scrollHeight;

});

}

async function sendMessage(){

const text=input.value.trim();

if(text==="") return;

sendBtn.disabled=true;

try{

await push(ref(db,"globalChat"),{

uid:myUid,

username:myName,

role:myRole,

message:text,

reply:replyData,

time:Date.now()

});

input.value="";
cancelReply();

}catch(e){

alert("Gagal mengirim pesan");

console.error(e);

}

sendBtn.disabled=false;

input.focus();

}

sendBtn.onclick=sendMessage;

input.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

e.preventDefault();

sendMessage();

document.getElementById("clearBtn").onclick=async()=>{

if(myRole!=="Developer" && myRole!=="Owner"){

alert("Hanya Developer/Owner.");

return;

}

if(!confirm("Hapus seluruh chat?")) return;

await remove(ref(db,"globalChat"));

chatBox.innerHTML="";

};

}

});

function escapeHtml(str){

return str

.replace(/&/g,"&amp;")

.replace(/</g,"&lt;")

.replace(/>/g,"&gt;")

.replace(/"/g,"&quot;")

.replace(/'/g,"&#039;");

}

function cancelReply(){

replyData=null;
replyBox.style.display="none";

  }

</script>

</body>
</html>
