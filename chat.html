<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX | Global Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

:root{

--bg:#070707;
--card:#131313;
--card2:#1b1b1b;
--red:#ff2020;
--border:#333;
--text:#fff;

}

body{

background:var(--bg);
color:var(--text);
overflow:hidden;

}

body::before{

content:"";
position:fixed;
inset:0;
pointer-events:none;

background:
radial-gradient(circle at top left,#ff000015,transparent 35%),
radial-gradient(circle at bottom right,#ff000012,transparent 35%);

}

.grid{

position:fixed;
inset:0;

opacity:.04;

background-image:
linear-gradient(#ff0000 1px,transparent 1px),
linear-gradient(90deg,#ff0000 1px,transparent 1px);

background-size:40px 40px;

pointer-events:none;

}

header{

height:72px;

display:flex;
align-items:center;
justify-content:space-between;

padding:15px;

background:#101010;

border-bottom:1px solid #242424;

}

.iconBtn{

width:48px;
height:48px;

display:flex;
justify-content:center;
align-items:center;

border-radius:16px;

background:#181818;

border:1px solid #333;

cursor:pointer;

transition:.25s;

}

.iconBtn:hover{

border-color:var(--red);

box-shadow:0 0 15px rgba(255,0,0,.3);

}

.iconBtn span{

font-size:28px;
color:var(--red);

}

.logo{

text-align:center;

}

.logo h2{

font-size:18px;
letter-spacing:3px;

}

.logo p{

font-size:10px;
color:#888;

margin-top:3px;

}

.main{

height:calc(100vh - 72px);

display:flex;

flex-direction:column;

padding:14px;

}

.chatBox{

flex:1;

overflow-y:auto;

background:var(--card);

border:1px solid var(--border);

border-radius:22px;

padding:14px;

display:flex;

flex-direction:column;

gap:12px;

}

.chatBox::-webkit-scrollbar{

width:6px;

}

.chatBox::-webkit-scrollbar-thumb{

background:var(--red);
border-radius:20px;

}

.bubble{

max-width:85%;

background:#191919;

border:1px solid #2f2f2f;

border-radius:18px;

padding:12px;

animation:show .25s;

}

.me{

align-self:flex-end;

background:#2b0000;

border-color:var(--red);

}

@keyframes show{

from{

opacity:0;
transform:translateY(12px);

}

to{

opacity:1;
transform:none;

}

}

.name{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:8px;

font-size:11px;

font-weight:700;

color:#ff7070;

}

.role{

padding:3px 8px;

border-radius:20px;

font-size:9px;

background:#300000;

border:1px solid #660000;

}

.replyMessage{

background:#242424;

border-left:3px solid var(--red);

padding:8px;

border-radius:10px;

margin-bottom:8px;

font-size:11px;

color:#ccc;

}

.msg{

font-size:13px;

line-height:1.6;

word-break:break-word;

}

.time{

margin-top:8px;

text-align:right;

font-size:10px;

color:#777;

}

.replyBox{

display:none;

margin-top:10px;

background:#1c1c1c;

border-left:4px solid var(--red);

padding:12px;

border-radius:14px;

}

.replyUser{

font-size:12px;

font-weight:700;

color:#ff6060;

}

.replyText{

margin-top:5px;

font-size:11px;

color:#bbb;

}

.cancelReply{

margin-top:10px;

padding:7px 14px;

border:none;

border-radius:10px;

background:#ff2020;

color:#fff;

cursor:pointer;

}

.inputArea{

display:flex;

align-items:center;

gap:10px;

margin-top:12px;

}

.inputArea input{

flex:1;

height:54px;

padding:0 18px;

background:#171717;

border:1px solid #333;

border-radius:16px;

outline:none;

color:#fff;

font-size:13px;

}

.inputArea input:focus{

border-color:var(--red);

box-shadow:0 0 12px rgba(255,0,0,.25);

}

.sendBtn{

width:55px;
height:54px;

border:none;

border-radius:16px;

background:var(--red);

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

transition:.25s;

}

.sendBtn:hover{

transform:scale(1.05);

}

.sendBtn span{

font-size:28px;
color:#fff;

}

.loading{

margin:auto;

text-align:center;

color:#999;

}

.loading span{

font-size:42px;

display:block;

margin-bottom:10px;

color:var(--red);

animation:spin 2s linear infinite;

}

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

</style>

</head>

<body>

<div class="grid"></div>

<header>

<div id="backBtn" class="iconBtn">
<span class="material-symbols-outlined">
arrow_back
</span>
</div>

<div class="logo">
<h2>DEVONAX CHAT</h2>
<p>Realtime Global Chat</p>
</div>

<div id="clearBtn" class="iconBtn">
<span class="material-symbols-outlined">
delete
</span>
</div>

</header>

<div class="main">

<div id="chatBox" class="chatBox">

<div class="loading">

<span class="material-symbols-outlined">
forum
</span>

Menghubungkan ke server...

</div>

</div>

<div id="replyBox" class="replyBox">

<div id="replyUser" class="replyUser"></div>

<div id="replyText" class="replyText"></div>

<button class="cancelReply" onclick="cancelReply()">
Batal Balas
</button>

</div>

<div class="inputArea">

<input
id="messageInput"
type="text"
maxlength="300"
placeholder="Tulis pesan..."
>

<button id="sendBtn" class="sendBtn">

<span class="material-symbols-outlined">
send
</span>

</button>

</div>

  </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import{
getDatabase,
ref,
push,
get,
remove,
query,
limitToLast,
onChildAdded,
remove as deleteData
}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

const chatBox=document.getElementById("chatBox");
const input=document.getElementById("messageInput");
const sendBtn=document.getElementById("sendBtn");

let myUid="";
let myName="";
let myRole="";

let replyData=null;

document.getElementById("backBtn").onclick=()=>history.back();

window.cancelReply=()=>{

replyData=null;

document.getElementById("replyBox").style.display="none";

};

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="../login.html";

return;

}

myUid=user.uid;

const snap=await get(ref(db,"users/"+user.uid));

if(snap.exists()){

const d=snap.val();

myName=d.username||user.email.split("@")[0];

myRole=d.role||"Member";

}

loadChat();

});

function escapeHtml(text){

return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}

function loadChat(){

chatBox.innerHTML="";

const q=query(
ref(db,"globalChat"),
limitToLast(100)
);

onChildAdded(q,(snap)=>{

const key=snap.key;
const d=snap.val();

const bubble=document.createElement("div");

bubble.className=
d.uid===myUid
?
"bubble me"
:
"bubble";

// Klik untuk reply
bubble.onclick=()=>{

replyData={

username:d.username,
message:d.message

};

document.getElementById("replyBox").style.display="block";
document.getElementById("replyUser").innerText="Balas "+d.username;
document.getElementById("replyText").innerText=d.message;

};

// Double klik hapus pesan sendiri
bubble.ondblclick=async()=>{

if(d.uid!==myUid) return;

if(!confirm("Hapus pesan ini?")) return;

await deleteData(ref(db,"globalChat/"+key));

bubble.remove();

};

bubble.innerHTML=`

<div class="name">

<span>${escapeHtml(d.username)}</span>

<span class="role">${escapeHtml(d.role)}</span>

</div>

${d.reply?`

<div class="replyMessage">

<b>${escapeHtml(d.reply.username)}</b><br>

${escapeHtml(d.reply.message)}

</div>

`:''}

<div class="msg">

${escapeHtml(d.message)}

</div>

<div class="time">

${new Date(d.time).toLocaleTimeString("id-ID",{

hour:"2-digit",
minute:"2-digit"

})}

</div>

`;

chatBox.appendChild(bubble);

chatBox.scrollTop=chatBox.scrollHeight;

});

}

async function sendMessage(){

const text=input.value.trim();

if(!text) return;

sendBtn.disabled=true;

try{

await push(ref(db,"globalChat"),{

uid:myUid,

username:myName,

role:myRole,

message:text,

reply:replyData,

time:Date.now()

});

input.value="";

cancelReply();

}catch(e){

alert("Gagal mengirim pesan");

console.error(e);

}

sendBtn.disabled=false;

input.focus();

}

sendBtn.onclick=sendMessage;

input.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

e.preventDefault();

sendMessage();

}

});

// Clear semua chat
document.getElementById("clearBtn").onclick=async()=>{

const role=myRole.toLowerCase();

if(role!=="developer" && role!=="owner"){

alert("Hanya Developer / Owner.");

return;

}

if(!confirm("Hapus seluruh chat?")) return;

await deleteData(ref(db,"globalChat"));

chatBox.innerHTML="";

};
  
</script>

</script>
</body>
                    </html>
