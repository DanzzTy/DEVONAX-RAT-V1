<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX • Change Password</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@1" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
font-family:Poppins,sans-serif;
}

:root{

--bg:#070707;
--card:#141414;
--red:#ff2b2b;
--red2:#8d0000;
--border:#2d2d2d;
--text:#fff;
--sub:#999;

}

body{

background:var(--bg);
color:#fff;
padding:20px;
padding-bottom:100px;
overflow-x:hidden;

}

body::before{

content:"";

position:fixed;
inset:0;

background:

radial-gradient(circle at top left,
rgba(255,0,0,.10),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(255,0,0,.08),
transparent 40%);

pointer-events:none;

}

.container{

max-width:520px;
margin:auto;

animation:fade .45s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:none;

}

}

.header{

display:flex;
align-items:center;
justify-content:space-between;

margin-bottom:25px;

}

.back{

width:52px;
height:52px;

display:flex;
align-items:center;
justify-content:center;

border-radius:16px;

background:#171717;

border:1px solid var(--border);

cursor:pointer;

}

.back span{

font-size:28px;

}

.title{

font-family:Orbitron;

font-size:24px;

letter-spacing:3px;

}

.profile{

width:52px;
height:52px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(180deg,var(--red),#700);

box-shadow:0 0 18px rgba(255,0,0,.35);

}

.profile span{

font-size:28px;

}

.card{

background:var(--card);

border:1px solid var(--border);

border-radius:25px;

padding:22px;

box-shadow:0 0 18px rgba(255,0,0,.08);

margin-bottom:18px;

}

.icon{

width:85px;
height:85px;

margin:auto;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

background:linear-gradient(180deg,var(--red),var(--red2));

box-shadow:0 0 25px rgba(255,0,0,.45);

margin-bottom:18px;

}

.icon span{

font-size:42px;

}

h2{

text-align:center;

font-family:Orbitron;

letter-spacing:2px;

margin-bottom:8px;

}

.desc{

text-align:center;

color:var(--sub);

font-size:13px;

margin-bottom:25px;

}

.group{

margin-bottom:18px;

}

.group label{

display:block;

margin-bottom:8px;

font-size:13px;

color:#ccc;

}

.inputBox{

position:relative;

}

.inputBox input{

width:100%;

height:56px;

background:#101010;

border:1px solid var(--border);

border-radius:18px;

padding:0 55px 0 18px;

color:#fff;

font-size:15px;

outline:none;

transition:.25s;

}

.inputBox input:focus{

border-color:var(--red);

box-shadow:0 0 12px rgba(255,0,0,.25);

}

.eye{

position:absolute;

right:18px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

color:#888;

}

.eye span{

font-size:24px;

}

.btn{

width:100%;

height:58px;

border:none;

border-radius:18px;

background:linear-gradient(180deg,#ff3333,#9b0000);

color:#fff;

font-family:Orbitron;

font-size:15px;

letter-spacing:2px;

cursor:pointer;

transition:.25s;

margin-top:12px;

}

.btn:hover{

box-shadow:0 0 20px rgba(255,0,0,.35);

}

.msg{

display:none;

margin-top:18px;

padding:14px;

border-radius:14px;

text-align:center;

font-size:13px;

}

.success{

background:#003b14;

border:1px solid #00bb4b;

color:#67ff9d;

}

.error{

background:#390000;

border:1px solid #b60000;

color:#ff8b8b;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="back" id="backBtn">
<span class="material-symbols-rounded">
arrow_back
</span>
</div>

<div class="title">
DEVONAX
</div>

<div class="profile">
<span class="material-symbols-rounded">
lock_reset
</span>
</div>

</div>

<div class="card">

<div class="icon">
<span class="material-symbols-rounded">
password
</span>
</div>

<h2>CHANGE PASSWORD</h2>

<div class="desc">
Ubah password akun DEVONAX milikmu dengan aman.
</div>

<div class="group">

<label>Password Lama</label>

<div class="inputBox">

<input
type="password"
id="oldPassword"
placeholder="Masukkan password lama">

<div class="eye"
onclick="togglePassword('oldPassword',this)">
<span class="material-symbols-rounded">
visibility
</span>
</div>

</div>

</div>

<div class="group">

<label>Password Baru</label>

<div class="inputBox">

<input
type="password"
id="newPassword"
placeholder="Minimal 6 karakter">

<div class="eye"
onclick="togglePassword('newPassword',this)">
<span class="material-symbols-rounded">
visibility
</span>
</div>

</div>

</div>

<div class="group">

<label>Konfirmasi Password</label>

<div class="inputBox">

<input
type="password"
id="confirmPassword"
placeholder="Ulangi password baru">

<div class="eye"
onclick="togglePassword('confirmPassword',this)">
<span class="material-symbols-rounded">
visibility
</span>
</div>

</div>

</div>

<button
class="btn"
id="changeBtn">

UPDATE PASSWORD

</button>

<div
id="successBox"
class="msg success">

Password berhasil diperbarui.

</div>

<div
id="errorBox"
class="msg error">

Terjadi kesalahan.

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
EmailAuthProvider,
reauthenticateWithCredential,
updatePassword
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
get
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

let currentUser=null;

let dashboard="../dashboard.html";

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.replace("../login.html");

return;

}

currentUser=user;

const snap=await get(ref(db,"users/"+user.uid));

if(!snap.exists()) return;

const role=(snap.val().role||"member").toLowerCase();

switch(role){

case "developer":
dashboard="admin/dashboard.html";
break;

case "owner":
dashboard="owner/dashboard.html";
break;

case "admin":
dashboard="admin/dashboard.html";
break;

case "reseller":
dashboard="reseller/dashboard.html";
break;

case "vip":
dashboard="vip/dashboard.html";
break;

default:
dashboard="../dashboard.html";

}

});

document.getElementById("backBtn").onclick=()=>{

location.href=dashboard;

};

document.getElementById("changeBtn").onclick=async()=>{

const oldPass=document.getElementById("oldPassword").value.trim();

const newPass=document.getElementById("newPassword").value.trim();

const confirm=document.getElementById("confirmPassword").value.trim();

const ok=document.getElementById("successBox");

const err=document.getElementById("errorBox");

ok.style.display="none";

err.style.display="none";

if(oldPass==""||newPass==""||confirm==""){

err.innerHTML="Semua kolom wajib diisi.";

err.style.display="block";

return;

}

if(newPass.length<6){

err.innerHTML="Password minimal 6 karakter.";

err.style.display="block";

return;

}

if(newPass!==confirm){

err.innerHTML="Konfirmasi password tidak sama.";

err.style.display="block";

return;

}

try{

const credential=EmailAuthProvider.credential(

currentUser.email,

oldPass

);

await reauthenticateWithCredential(

currentUser,

credential

);

await updatePassword(

currentUser,

newPass

);

ok.style.display="block";

document.getElementById("oldPassword").value="";

document.getElementById("newPassword").value="";

document.getElementById("confirmPassword").value="";

}catch(e){

let pesan="Gagal mengganti password.";

switch(e.code){

case "auth/wrong-password":
pesan="Password lama salah.";
break;

case "auth/invalid-credential":
pesan="Password lama salah.";
break;

case "auth/weak-password":
pesan="Password baru terlalu lemah.";
break;

case "auth/requires-recent-login":
pesan="Silakan login ulang terlebih dahulu.";
break;

}

err.innerHTML=pesan;

err.style.display="block";

}

};

window.togglePassword=function(id,el){

const input=document.getElementById(id);

const icon=el.querySelector("span");

if(input.type==="password"){

input.type="text";

icon.innerHTML="visibility_off";

}else{

input.type="password";

icon.innerHTML="visibility";

}

};

</script>

</body>
</html>
