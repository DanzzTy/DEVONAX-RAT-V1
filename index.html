<script>

const app=new PIXI.Application({

width:340,

height:70,

transparent:true,

antialias:true,

backgroundAlpha:0

});

document.getElementById("titleArea").appendChild(app.view);

const style=new PIXI.TextStyle({

fontFamily:"Orbitron",

fontWeight:"800",

fontSize:30,

fill:"#efefef",

letterSpacing:7,

dropShadow:true,

dropShadowColor:"#ffffff",

dropShadowBlur:8,

dropShadowDistance:0

});

const text=new PIXI.Text({

text:"DEVONAX",

style

});

text.anchor.set(.5);

text.x=170;

text.y=35;

app.stage.addChild(text);

/* Layer RGB */

const red=text.clone();

red.style.fill="#ff3155";

red.alpha=.35;

app.stage.addChild(red);

const blue=text.clone();

blue.style.fill="#55dfff";

blue.alpha=.35;

app.stage.addChild(blue);

const shards=[];

const shardContainer=new PIXI.Container();

app.stage.addChild(shardContainer);

let shatter=false;

let restore=false;

let glitchFrame=0;

const flash=new PIXI.Graphics();

flash.beginFill(0xffffff);

flash.drawRect(0,0,340,70);

flash.endFill();

flash.alpha=0;

app.stage.addChild(flash);

let timer=0;

app.ticker.add(()=>{

timer+=0.05;

red.x=text.x+Math.sin(timer*12)*2;

red.y=text.y;

blue.x=text.x-Math.sin(timer*10)*2;

blue.y=text.y;

if(shatter){

updateShards();

text.alpha=0;

red.alpha=0;

blue.alpha=0;

if(shards.length>0&&shards[0].alpha<=0){

shatter=false;

restore=true;

glitchFrame=18;

flash.alpha=.85;

  }

}

  }

if(restore){

flash.alpha*=0.82;

text.alpha=1;

red.alpha=.45;

blue.alpha=.45;

red.x=text.x+(Math.random()*12-6);

blue.x=text.x+(Math.random()*12-6);

red.y=text.y+(Math.random()*4-2);

blue.y=text.y+(Math.random()*4-2);

text.rotation=(Math.random()-.5)*0.03;

glitchFrame--;

if(glitchFrame<=0){

restore=false;

text.rotation=0;

red.alpha=.30;

blue.alpha=.30;

red.x=text.x;

blue.x=text.x;

red.y=text.y;

blue.y=text.y;

shardContainer.removeChildren();

}

  }

const scan=new PIXI.Graphics();

for(let y=0;y<70;y+=3){

scan.beginFill(0xffffff,.04);

scan.drawRect(0,y,340,1);

scan.endFill();

}

app.stage.addChild(scan);

setInterval(()=>{

createShards();

shatter=true;

},5500);

function createShards(){

shardContainer.removeChildren();

shards.length=0;

for(let i=0;i<220;i++){

const g=new PIXI.Graphics();

g.beginFill(0xffffff);

g.moveTo(0,0);

g.lineTo(Math.random()*4+2,Math.random()*2);

g.lineTo(Math.random()*2,Math.random()*5+2);

g.closePath();

g.endFill();

g.x=text.x+(Math.random()*180-90);

g.y=text.y+(Math.random()*22-11);

g.alpha=1;

g.rotation=Math.random()*6.28;

g.tint=[
0xffffff,
0xe8e8e8,
0xdadada
][Math.floor(Math.random()*3)];

g.vx=(Math.random()>.5?1:-1)*(Math.random()*2+1);

g.vy=(Math.random()-.5)*0.25;

g.vr=(Math.random()-.5)*0.15;

shardContainer.addChild(g);

shards.push(g);

}

  }

function updateShards(){

for(const s of shards){

s.x+=s.vx;

s.y+=s.vy;

s.rotation+=s.vr;

s.alpha-=0.018;

s.scale.x*=0.997;

s.scale.y*=0.997;

}

  }

scan.alpha=.04+Math.random()*.05;

/* glitch acak */

if(Math.random()<0.03){

red.x=text.x+(Math.random()*8-4);

blue.x=text.x+(Math.random()*8-4);

red.y=text.y+(Math.random()*2-1);

blue.y=text.y+(Math.random()*2-1);

}else{

red.x+=(text.x-red.x)*0.2;

blue.x+=(text.x-blue.x)*0.2;

red.y+=(text.y-red.y)*0.2;

blue.y+=(text.y-blue.y)*0.2;

}

});

</script>
