<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVONAX RAT PROJECT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#090909;
color:#fff;
}

header{
background:#b30000;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
box-shadow:0 0 20px red;
}

.container{
padding:15px;
}

.card{
background:#111;
border:1px solid #ff2d2d;
border-radius:12px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(255,0,0,.4);
}

.title{
color:#ff3c3c;
font-size:18px;
margin-bottom:10px;
}

.status{
font-size:18px;
color:#00ff66;
}

button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:10px;
background:#d10000;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff0000;
box-shadow:0 0 20px red;
}

.code{
margin-top:10px;
font-size:28px;
text-align:center;
letter-spacing:4px;
color:#00ff99;
}

.device{
padding:12px;
background:#181818;
border-radius:10px;
margin-top:10px;
border-left:5px solid red;
}

.footer{
text-align:center;
margin-top:30px;
opacity:.7;
font-size:13px;
}
</style>
</head>

<body>

<header>
DEVONAX RAT
</header>

<div class="container">

<div class="card">
<div class="title">Status</div>
<div class="status">🟢 Dashboard Aktif</div>
<p>Perangkat Terhubung : <b>0</b></p>
</div>

<div class="card">
<div class="title">Pairing</div>

<button onclick="generateCode()">
Generate Pair Code
</button>

<div class="code" id="pairCode">
------
</div>

</div>

<div class="card">
<div class="title">Perangkat Terhubung</div>

<div id="deviceList">

<div class="device">
Belum ada perangkat terhubung
</div>

</div>

</div>

<div class="card">
<div class="title">Aksi</div>

<button onclick="refreshData()">Refresh</button>

<button onclick="disconnectAll()">Disconnect Semua</button>

</div>

<div class="footer">
© DEVONAX RAT
</div>

</div>
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import { 
getDatabase,
ref,
set,
onValue
} 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyCnGnqV6fKvO3XDLBucrsIYPjGuafTun7g",

authDomain: "rat-jancok.firebaseapp.com",

databaseURL:
"https://rat-jancok-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "rat-jancok",

storageBucket: "rat-jancok.firebasestorage.app",

messagingSenderId: "832199244613",

appId: "1:832199244613:web:d40428c4fd6e73d37d1c2c"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);
// cek semua sesi yang dibuat parent

onValue(ref(db,"sessions"),(snapshot)=>{

let data = snapshot.val();

let list = document.getElementById("deviceList");


if(data){

let html="";

Object.keys(data).forEach(code=>{

let session=data[code];


if(session.connected){

html += `

<div class="device">

🟢 Connected<br>

Kode: ${code}<br>

Status:
${session.child?.status || "Online"}

</div>

`;

}

});


if(html){

list.innerHTML=html;

}else{

list.innerHTML=
'<div class="device">Belum ada perangkat terhubung</div>';

}


}

});


window.generateCode = function(){

let code =
"CP-" + Math.floor(100000 + Math.random()*900000);


document.getElementById("pairCode").innerHTML = code;


// simpan kode ke Firebase

set(ref(db,"sessions/"+code),{

created: Date.now(),

connected:false

});


}

</script>

</body>
  </html>
