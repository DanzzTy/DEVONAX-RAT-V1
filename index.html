<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEVONAX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#050505;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Background */

body::before{
content:"";
position:absolute;
inset:0;

background:
radial-gradient(circle at top left,#ff000022,transparent 35%),
radial-gradient(circle at bottom right,#ff000022,transparent 35%);

animation:bg 10s linear infinite;
}

@keyframes bg{

0%{transform:translateY(0);}
50%{transform:translateY(-30px);}
100%{transform:translateY(0);}

}

/* Matrix */

.matrix{
position:absolute;
inset:0;
opacity:.05;
background-image:
linear-gradient(#ff0000 1px,transparent 1px),
linear-gradient(90deg,#ff0000 1px,transparent 1px);
background-size:40px 40px;
}

/* Container */

.container{

position:relative;

width:100%;
max-width:420px;

height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:25px;

}

/* Access */

.badge{

padding:12px 35px;

border:2px solid red;

border-radius:50px;

color:#ff3d3d;

letter-spacing:4px;

font-size:13px;

box-shadow:
0 0 15px red,
0 0 30px #ff000050;

animation:glow 1.4s infinite alternate;

}

@keyframes glow{

from{

box-shadow:0 0 10px red;

}

to{

box-shadow:
0 0 20px red,
0 0 45px red;

}

}

.logo{

margin-top:30px;

font-size:48px;

font-weight:800;

letter-spacing:8px;

color:#ff0000;

text-shadow:
0 0 20px red,
0 0 40px red;

}

.tag{

margin-top:10px;

color:#ff4d4d;

font-size:15px;

letter-spacing:4px;

}

.character{

margin-top:20px;

width:100%;

max-width:350px;

filter:drop-shadow(0 0 25px red);

animation:float 3s ease-in-out infinite;

}

@keyframes float{

50%{

transform:translateY(-15px);

}

}

button{

margin-top:25px;

width:100%;

height:70px;

border:none;

border-radius:18px;

background:#ff0000;

color:white;

font-size:20px;

font-weight:bold;

letter-spacing:4px;

cursor:pointer;

box-shadow:

0 0 20px red,
0 0 40px #ff000070;

transition:.3s;

}

button:hover{

transform:scale(1.03);

}

.footer{

margin-top:25px;

font-size:12px;

color:#ff4040;

letter-spacing:6px;

}

</style>

</head>

<body>

<div class="matrix"></div>

<div class="container">

<div class="badge">

// ACCESS GRANTED //

</div>

<div class="logo">

DEVONAX

</div>

<div class="tag">

Hack The Planet

</div>

<img src="img/file_00000000948c720b9e45b20eec849d6c.png" class="character">

<button onclick="window.location='login.html'">

ACCESS SYSTEM

</button>

<div class="footer">

// DEVONAX SECURITY SYSTEM //

</div>

</div>

</body>
  </html>
