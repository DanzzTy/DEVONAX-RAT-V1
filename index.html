<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEVONAX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#050505;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Background */

body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at top left,#ff000015,transparent 35%),
radial-gradient(circle at bottom right,#ff000015,transparent 35%);
}

body::after{
content:"";
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(255,0,0,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,0,0,.03) 1px,transparent 1px);
background-size:45px 45px;
}

/* Container */

.container{

position:relative;
width:100%;
max-width:420px;
height:100vh;
padding:35px 25px;

display:flex;
flex-direction:column;
align-items:center;

z-index:2;

}

/* Badge */

.badge{

margin-top:10px;

padding:10px 30px;

border:2px solid #ff0000;

border-radius:40px;

font-size:11px;

letter-spacing:4px;

color:#ff3b3b;

box-shadow:

0 0 15px red,
0 0 30px rgba(255,0,0,.3);

}

/* Logo */

.logo{

margin-top:25px;

font-size:42px;

font-weight:700;

letter-spacing:8px;

color:#ff0000;

text-shadow:

0 0 15px red,
0 0 30px red;

}

.tag{

margin-top:8px;

font-size:12px;

letter-spacing:3px;

color:#ff4a4a;

}

/* Character */

.character{

width:100%;

max-width:370px;

margin-top:10px;

flex:1;

object-fit:contain;

filter:drop-shadow(0 0 18px rgba(255,0,0,.45));

animation:float 3s ease-in-out infinite;

}

@keyframes float{

50%{

transform:translateY(-12px);

}

}

/* Button */

button{

width:100%;

height:78px;

margin-bottom:25px;

border:none;

border-radius:20px;

background:#ff0000;

color:#fff;

font-size:18px;

font-weight:700;

letter-spacing:4px;

cursor:pointer;

box-shadow:

0 0 20px red,
0 0 45px rgba(255,0,0,.5);

transition:.3s;

}

button:active{

transform:scale(.97);

}

/* Footer */

.footer{

position:absolute;

bottom:8px;

font-size:10px;

letter-spacing:5px;

color:#ff4040;

opacity:.4;

}

</style>

</head>

<body>

<div class="container">

<div class="badge">

// ACCESS GRANTED //

</div>

<div class="logo">

DEVONAX

</div>

<div class="tag">

Hack The Planet

</div>

<img src="img/file_00000000948c720b9e45b20eec849d6c.png" class="character">

<button id="accessBtn">

➜ ACCESS SYSTEM

</button>

<div class="footer">

©DEVELOPER: @DANZZGNTG

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

document.getElementById("accessBtn").onclick=()=>{

onAuthStateChanged(auth,(user)=>{

if(user){

location.href="intro.html";

}else{

location.href="login.html";

}

});

};

</script>

</body>
  </html>
