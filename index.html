<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

:root{

--bg:#060606;
--card:#121212;
--line:#303030;
--red:#ff2346;
--text:#fff;
--sub:#a8a8a8;

}

body{

background:var(--bg);
color:#fff;
overflow-x:hidden;

}

body::before{

content:"";

position:fixed;
inset:0;

background:

radial-gradient(circle at top,#ff003320,transparent 35%),
radial-gradient(circle at bottom,#ff003315,transparent 35%);

pointer-events:none;

}

.menuGrid{

margin-top:18px;

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}

.menuItem{

background:#151515;

border:1px solid rgba(255,35,70,.45);

border-radius:18px;

padding:14px;

display:flex;

align-items:center;

gap:10px;

cursor:pointer;

transition:.25s;

}

.menuItem:hover{

border-color:#ff2346;

box-shadow:0 0 18px rgba(255,0,0,.18);

}

.menuIcon{

width:42px;

height:42px;

border-radius:12px;

display:flex;

justify-content:center;

align-items:center;

font-size:20px;

color:#fff;

flex-shrink:0;

}

.wa{
background:#25D366;
}

.telegram{
background:#229ED9;
}

.email{
background:#ff2346;
}

.about{
background:#666;
}

.menuText{

flex:1;

}

.menuText h4{

font-size:12px;

margin-bottom:4px;

}

.menuText p{

font-size:10px;

color:#999;

}

.arrow{

font-size:12px;

color:#666;

}

.featureCard{

margin-top:14px;

background:#151515;

border:1px solid rgba(255,35,70,.45);

border-radius:18px;

padding:16px;

display:flex;

align-items:center;

gap:14px;

}

.featureIcon{

width:44px;

height:44px;

border-radius:14px;

background:#ff234615;

display:flex;

justify-content:center;

align-items:center;

font-size:18px;

color:#ff2346;

}

.featureCard h3{

font-size:14px;

margin-bottom:4px;

}

.featureCard p{

font-size:11px;

color:#999;

}

.copyright{

margin-top:22px;

text-align:center;

font-size:10px;

color:#666;

letter-spacing:2px;

}

.grid{

position:fixed;
inset:0;

opacity:.04;

background-image:

linear-gradient(#ff0030 1px,transparent 1px),
linear-gradient(90deg,#ff0030 1px,transparent 1px);

background-size:42px 42px;

pointer-events:none;

}

.container{

max-width:430px;

margin:auto;

padding:25px 18px 35px;

position:relative;

z-index:2;

/* LOGO */

.logoBox{

display:flex;

align-items:center;

}

.logo{

height:135px;

border-radius:50%;

overflow:hidden;

border:2px solid var(--red);

background:#111;

box-shadow:

0 0 28px rgba(255,0,0,.35),
0 0 55px rgba(255,0,0,.18);

animation:glow 2.5s infinite alternate;

}

.logo img{

width:100%;
height:100%;
object-fit:cover;

}

@keyframes glow{

100%{

box-shadow:

0 0 38px rgba(255,0,0,.55),
0 0 70px rgba(255,0,0,.28);

}

}

.title{

margin-top:18px;

font-size:27px;

letter-spacing:5px;

text-align:center;

}

.subtitle{

margin-top:6px;

font-size:11px;

letter-spacing:2px;

color:#bdbdbd;

}

/* INFO */

.info{

padding:14px;

border-radius:18px;

border:1px solid rgba(255,35,70,.45);

text-align:center;

font-size:11px;

color:#d0d0d0;

}

/* BUTTON */

.btn{

height:58px;

border:none;

border-radius:18px;

font-size:15px;

font-weight:700;

letter-spacing:2px;

justify-content:center;

align-items:center;

gap:10px;

background:#151515;
