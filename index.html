<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>DEVONAX PROJECT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">


<style>

:root{
--bg:#050507;
--panel:#15101f;
--pink:#ff2d55;
--cyan:#00f3ff;
--gray:#8e889b;
}


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Share Tech Mono',monospace;
}


body{
background:var(--bg);
color:white;
padding-bottom:90px;
}


/* HEADER */

header{
display:flex;
align-items:center;
gap:18px;
padding:20px;
}


.menu-btn{
font-size:24px;
cursor:pointer;
}


.logo{
font-family:Orbitron;
letter-spacing:2px;
}



/* SIDEBAR */

.sidebar{

position:fixed;
top:0;
left:-100%;
width:80%;
height:100%;
background:#120a1a;
z-index:1000;
transition:.4s;
padding:20px;
border-right:1px solid var(--pink);

}


.sidebar.active{
left:0;
}


.side-title{

font-family:Orbitron;
font-size:24px;
color:var(--pink);

}


.role{

display:inline-block;
margin-top:10px;
padding:5px 15px;
border-radius:10px;
background:#ff2d5520;
color:var(--pink);

}


.menu a{

display:block;
padding:15px;
margin-top:8px;
color:white;
text-decoration:none;
border-radius:12px;

}


.menu a:hover{

background:#ffffff10;

}


/* OVERLAY */

.overlay{

display:none;
position:fixed;
inset:0;
background:#000b;
z-index:999;

}

.overlay.active{
display:block;
}


/* BANNER */


.banner{

margin:20px;
height:190px;
border-radius:25px;
overflow:hidden;
position:relative;
border:1px solid #8a2be2;

}


.banner img{

width:100%;
height:100%;
object-fit:cover;

}


.banner-info{

position:absolute;
bottom:0;
padding:20px;
width:100%;
background:linear-gradient(transparent,#000);

}


.banner-info h2{

font-family:Orbitron;

}


/* CARD */


.card{

margin:20px;
padding:20px;
background:linear-gradient(145deg,#21152f,#120a1a);
border-radius:20px;
border:1px solid #8a2be233;

}


.stats{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;

}


.box{

background:#0005;
padding:15px;
border-radius:15px;

}


.box i{

color:var(--pink);
font-size:20px;

}


/* QUICK */


.quick{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}


.quick a{

background:#120a1a;
padding:25px;
border-radius:20px;
text-align:center;
text-decoration:none;
color:white;
border:1px solid #8a2be233;

}


.quick i{

font-size:30px;
color:var(--pink);
margin-bottom:10px;

}


/* NAVBAR */


.nav{

position:fixed;
bottom:0;
left:0;
right:0;

height:75px;

background:#090909;

display:flex;
justify-content:space-around;
align-items:center;

border-top:1px solid #8a2be2;

}


.nav a{

color:var(--gray);
text-decoration:none;
text-align:center;
font-size:11px;

}


.nav i{

display:block;
font-size:22px;
margin-bottom:5px;

}


.nav .active{

color:var(--pink);

}


</style>

</head>


<body>
