<!DOCTYPE html>
<html lang="id">

<title>DEVONAX RAT PROJECT</title>

<style>
.online-dot{
    width:10px;
    height:10px;
    background:#00ff66;
    border-radius:50%;
    display:inline-block;
    margin-right:8px;

    animation:
    pulse 1.2s infinite,
    blink 1.2s infinite;

    box-shadow:
    0 0 8px #00ff66,
    0 0 18px #00ff66;
}


@keyframes pulse{

0%{
    transform:scale(1);
}

50%{
    transform:scale(1.5);
}

100%{
    transform:scale(1);
}

}


@keyframes blink{

0%,100%{
    opacity:1;
}

50%{
    opacity:.3;
}

  }
  
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#090909;
color:#fff;
}

header{
background:#b30000;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
box-shadow:0 0 20px red;
}

.container{
padding:15px;
}

.card{
background:#111;
border:1px solid #ff2d2d;
border-radius:12px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(255,0,0,.4);
}

.title{
color:#ff3c3c;
font-size:18px;
margin-bottom:10px;
}

.status{
font-size:18px;
color:#00ff66;
}

button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:10px;
background:#d10000;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff0000;
box-shadow:0 0 20px red;
}

.code{
margin-top:10px;
font-size:28px;
text-align:center;
letter-spacing:4px;
color:#00ff99;
}

.device{
padding:12px;
background:#181818;
border-radius:10px;
margin-top:10px;
border-left:5px solid red;
}

.footer{
text-align:center;
margin-top:30px;
opacity:.7;
font-size:13px;
}
</style>
</head>

            }

        });

    }

    document.getElementById("deviceCount").innerHTML = count;

    list.innerHTML = html ||

});
