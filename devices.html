<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DEVONAX • Devices</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Orbitron,sans-serif}
body{background:#0a0a0a;color:#fff;padding:18px}
.card{background:#171717;border:1px solid #333;border-radius:18px;padding:18px;margin-bottom:16px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.icon{width:48px;height:48px;border:none;border-radius:14px;background:#191919;color:#fff}
.title{font-size:13px;color:#ff5d5d;margin-bottom:12px;letter-spacing:2px}
.info{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #262626}
.info:last-child{border:none}
button.action{
width:100%;
margin-top:10px;
padding:14px;
background:#ff2b2b;
border:none;
border-radius:12px;
color:#fff;
cursor:pointer;
}
#status{color:#65ff8f}
img{width:100%;border-radius:14px}
</style>
</head>

<body>

<div class="top">
<button id="backBtn" class="icon">
<span class="material-symbols-outlined">arrow_back</span>
</button>

<h2>DEVICES</h2>

<button id="refreshBtn" class="icon">
<span class="material-symbols-outlined">refresh</span>
</button>
</div>

<div class="card">

<div class="title">DEVICE</div>

<div class="info">
<span>Nama</span>
<b id="deviceName">-</b>
</div>

<div class="info">
<span>Pairing</span>
<b id="pairingId">-</b>
</div>

<div class="info">
<span>Status</span>
<b id="status">Offline</b>
</div>

<div class="info">
<span>Baterai</span>
<b id="battery">--%</b>
</div>

</div>

<div class="card">

<div class="title">SHARED PHOTO</div>

<img id="photo" src="img/no-photo.png">

</div>

<div class="card">

<div class="title">REQUEST</div>

<p>
Permintaan hanya akan dikirim. Perangkat pasangan harus meminta persetujuan pengguna sebelum membagikan data.
</p>

<button class="action" id="requestPhoto">
Ambil Foto Target
</button>

<button class="action" id="requestLocation">
Lokasi Target
</button>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {getAuth,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import {getDatabase,ref,get,onValue,push,set} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",
authDomain:"project-coding-gabut.firebaseapp.com",
databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"project-coding-gabut",
storageBucket:"project-coding-gabut.firebasestorage.app",
messagingSenderId:"234910334669",
appId:"1:234910334669:web:5203c9e9ce22a596f2b384"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

let pairing="";
let role="parent";

onAuthStateChanged(auth,async(user)=>{

if(!user){
location="login.html";
return;
}

const snap=await get(ref(db,"users/"+user.uid));

if(!snap.exists()) return;

const u=snap.val();

pairing=u.pairingId||"-";
role=u.role||"parent";

pairingId.textContent=pairing;

onValue(ref(db,"devices/"+pairing),(s)=>{

if(!s.exists()) return;

const d=s.val();

deviceName.textContent=d.deviceName||"-";
battery.textContent=(d.battery??"--")+"%";
status.textContent=d.online?"Online":"Offline";

});

onValue(ref(db,"sharedPhotos/"+pairing+"/latest"),(s)=>{

if(s.exists()){

photo.src=s.val().imageUrl;

}

});

});

backBtn.onclick=()=>{

location.href=role==="parent"
?"dashboard.html"
:"child_dashboard.html";

};

refreshBtn.onclick=()=>{

location.reload();

};

function request(type){

if(!pairing) return;

const r=push(ref(db,"requests/"+pairing));

set(r,{
type,
status:"pending",
createdAt:Date.now()
});

alert("Permintaan berhasil dikirim. Pengguna perangkat tujuan harus menyetujui terlebih dahulu.");

}

requestPhoto.onclick=()=>request("share_photo");
requestLocation.onclick=()=>request("share_location");

</script>

</body>
  </html>
