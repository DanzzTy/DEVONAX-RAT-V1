<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DEVONAX • Devices</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Orbitron,sans-serif}
body{background:#050505;color:#fff;overflow:hidden}
canvas{position:fixed;inset:0;z-index:-1}
.wrap{padding:20px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.btn{
width:48px;height:48px;border:none;border-radius:14px;
background:#141414;color:#fff;cursor:pointer;
border:1px solid #333;
}
.logo{font-size:24px;color:#00ff66}
.card{
background:rgba(18,18,18,.92);
border:1px solid #00ff6640;
border-radius:18px;
padding:18px;
margin-bottom:16px;
backdrop-filter:blur(8px);
}
.title{
font-size:12px;
letter-spacing:2px;
color:#00ff66;
margin-bottom:15px;
}
.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #222;
}
.row:last-child{border:none}
.value{color:#00ff66;word-break:break-all}
.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
background:#003b18;
color:#00ff66;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="wrap">

<div class="top">

<button class="btn" id="backBtn">
<span class="material-symbols-outlined">arrow_back</span>
</button>

<div class="logo">DEVICES</div>

<button class="btn" onclick="location.reload()">
<span class="material-symbols-outlined">refresh</span>
</button>

</div>

<div class="card">

<div class="title">ACCOUNT</div>

<div class="row">
<span>Username</span>
<b id="username" class="value">Loading...</b>
</div>

<div class="row">
<span>Role</span>
<b id="role" class="value">Loading...</b>
</div>

<div class="row">
<span>Pairing ID</span>
<b id="pairingId" class="value">Loading...</b>
</div>

<div class="row">
<span>Status</span>
<span class="status" id="status">ONLINE</span>
</div>

</div>

</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {getAuth,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import {getDatabase,ref,get} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",
authDomain:"project-coding-gabut.firebaseapp.com",
databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"project-coding-gabut",
storageBucket:"project-coding-gabut.firebasestorage.app",
messagingSenderId:"234910334669",
appId:"1:234910334669:web:5203c9e9ce22a596f2b384"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

let role="member";

onAuthStateChanged(auth,async(user)=>{

if(!user){
location.href="login.html";
return;
}

const snap=await get(ref(db,"users/"+user.uid));

if(!snap.exists()) return;

const d=snap.val();

role=d.role||"member";

username.textContent=d.username||user.email;
pairingId.textContent=d.pairingId||"-";
document.getElementById("role").textContent=role;

});

backBtn.onclick=()=>{

switch(role){

case "developer":
location.href="developer/dashboard.html";
break;

case "owner":
location.href="owner/dashboard.html";
break;

case "reseller":
location.href="reseller/dashboard.html";
break;

case "admin":
location.href="admin/dashboard.html";
break;

case "vip":
location.href="vip/dashboard.html";
break;
    
}

};
</script>

<script>
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const size=16;
const cols=Math.floor(canvas.width/size);
const drops=new Array(cols).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff66";
ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){
const text=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(text,i*size,drops[i]*size);

if(drops[i]*size>canvas.height&&Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,35);

onresize=()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
};
</script>

</body>
  </html>
