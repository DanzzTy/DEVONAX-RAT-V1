<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>DEVONAX • DEVICE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

:root{

--bg:#080808;
--card:#141414;
--card2:#1b1b1b;
--red:#ff2020;
--border:#333;
--text:#fff;

}

body{

background:var(--bg);
color:var(--text);
overflow-x:hidden;
padding:18px;
padding-bottom:100px;

}

body::before{

content:"";
position:fixed;
inset:0;
pointer-events:none;

background:

radial-gradient(circle at top left,#ff000015,transparent 35%),
radial-gradient(circle at bottom right,#ff000015,transparent 35%);

}

.grid{

position:fixed;
inset:0;
opacity:.04;
pointer-events:none;

background-image:

linear-gradient(#ff0000 1px,transparent 1px),

linear-gradient(90deg,#ff0000 1px,transparent 1px);

background-size:40px 40px;

}

header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.backBtn,
.profileBtn{

width:54px;
height:54px;

display:flex;
justify-content:center;
align-items:center;

background:#151515;

border:1px solid var(--border);

border-radius:18px;

cursor:pointer;

transition:.25s;

}

.backBtn:hover,
.profileBtn:hover{

border-color:var(--red);

box-shadow:0 0 18px rgba(255,0,0,.30);

}

.backBtn span,
.profileBtn span{

font-size:28px;

}

.logo{

font-size:30px;
font-weight:800;
letter-spacing:5px;

}

.banner{

position:relative;
height:190px;

border-radius:24px;
overflow:hidden;

border:1px solid #333;

margin-bottom:20px;

}

.banner img{

width:100%;
height:100%;
object-fit:cover;
filter:brightness(.35);

}

.banner::after{

content:"";

position:absolute;
inset:0;

background:linear-gradient(

transparent,

rgba(0,0,0,.25),

rgba(0,0,0,.9)

);

}

.bannerText{

position:absolute;

left:22px;
bottom:22px;

z-index:2;

}

.bannerText h2{

font-size:25px;
letter-spacing:3px;

}

.bannerText p{

margin-top:8px;

font-size:11px;

color:#ddd;

}

.card{

background:var(--card);

border:1px solid #333;

border-radius:22px;

padding:18px;

margin-bottom:18px;

box-shadow:0 0 15px rgba(255,0,0,.08);

}

.title{

font-size:13px;

letter-spacing:3px;

color:#ff6666;

margin-bottom:15px;

text-transform:uppercase;

}

</style>

</head>

<body>

<div class="grid"></div>

<header>

<div class="backBtn" id="backBtn">

<span class="material-symbols-outlined">

arrow_back

</span>

</div>

<div class="logo">

DEVONAX

</div>

<div class="profileBtn">

<span class="material-symbols-outlined">

devices

</span>

</div>

</header>

<div class="banner">

<img src="img/banner-device.jpg">

<div class="bannerText">

<h2>

DEVICE PANEL

</h2>

<p>

REMOTE ACCESS TROJAN

</p>

</div>

</div>
