<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Orbitron,sans-serif;
}

:root{
--bg:#090909;
--card:#121212;
--red:#ff1a1a;
--red2:#8b0000;
--text:#ffffff;
--gray:#8d8d8d;
}

body{
background:var(--bg);
color:var(--text);
padding:18px 18px 90px;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#ff000018,transparent 35%),
radial-gradient(circle at bottom right,#ff000018,transparent 35%);
pointer-events:none;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.menu,
.avatar{
width:48px;
height:48px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:#151515;
border:1px solid #300;
}

.avatar{
background:linear-gradient(180deg,#ff2020,#900);
}

.logo{
font-size:25px;
font-weight:800;
letter-spacing:5px;
color:var(--red);
text-shadow:0 0 15px red;
}

.card{
background:var(--card);
border-radius:22px;
border:1px solid #300;
padding:18px;
box-shadow:0 0 18px rgba(255,0,0,.15);
margin-bottom:18px;
}

.profile{
display:flex;
gap:16px;
align-items:center;
}

.userimg{
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(180deg,#ff2020,#700);
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
}

.username{
font-size:22px;
font-weight:700;
}

.role{
margin-top:5px;
display:inline-block;
padding:4px 12px;
border-radius:20px;
background:#220000;
border:1px solid #500;
color:#ff5555;
font-size:12px;
}

.expired{
margin-top:10px;
font-size:12px;
color:var(--gray);
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.box{
background:#141414;
border:1px solid #300;
border-radius:18px;
padding:16px;
text-align:center;
}

.box span{
font-size:34px;
color:var(--red);
}

.box h2{
margin-top:8px;
font-size:20px;
}

.box p{
margin-top:4px;
font-size:11px;
color:var(--gray);
}

.title{
font-size:15px;
margin-bottom:12px;
color:#ff5b5b;
letter-spacing:2px;
}
</style>
</head>

<body>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
    getDatabase,
    ref,
    get
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",
authDomain:"project-coding-gabut.firebaseapp.com",
databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"project-coding-gabut",
storageBucket:"project-coding-gabut.firebasestorage.app",
messagingSenderId:"234910334669",
appId:"1:234910334669:web:5203c9e9ce22a596f2b384"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

onAuthStateChanged(auth, async (user)=>{

    if(!user){
        location.href="login.html";
        return;
    }

    const snap = await get(ref(db,"users/"+user.uid));

    if(!snap.exists()){

        alert("Akun belum diaktifkan.");

        await signOut(auth);

        location.href="login.html";

        return;

    }

    const d = snap.val();

    document.getElementById("username").textContent = d.username;
    document.getElementById("role").textContent = d.role;
    document.getElementById("expired").textContent = "Expired : " + d.expired;
    document.getElementById("device").textContent = d.device;
    document.getElementById("bug").textContent = d.bug;
    document.getElementById("news").textContent = d.news;

});

</script>
