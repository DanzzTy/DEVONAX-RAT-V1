<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@1" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{

--bg:#070707;
--card:#131313;
--red:#ff2b2b;
--border:#2a2a2a;
--text:#fff;
--sub:#999;

}

body{

background:#070707;
color:#fff;
padding:20px;
padding-bottom:110px;
overflow-x:hidden;

}

body::before{

content:"";
position:fixed;
inset:0;

background:

radial-gradient(circle at top left,
rgba(255,0,0,.13),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(255,0,0,.08),
transparent 40%);

pointer-events:none;

}

.container{

max-width:520px;
margin:auto;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:25px;

}

.logo{

font-family:Orbitron;
font-size:26px;
letter-spacing:3px;

}

.profile{

width:52px;
height:52px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(180deg,#ff3333,#700);

box-shadow:0 0 18px rgba(255,0,0,.4);

}

.profile span{

font-size:28px;

}

.player{

background:var(--card);

border:1px solid var(--border);

border-radius:25px;

padding:25px;

text-align:center;

box-shadow:0 0 18px rgba(255,0,0,.08);

margin-bottom:20px;

}

.cover{

width:220px;
height:220px;

margin:auto;

border-radius:22px;

overflow:hidden;

background:#222;

box-shadow:0 0 20px rgba(255,0,0,.25);

}

.cover img{

width:100%;
height:100%;
object-fit:cover;

}

.song{

margin-top:20px;

font-family:Orbitron;

font-size:20px;

}

.artist{

margin-top:8px;

font-size:13px;

color:#aaa;

}

.progress{

margin-top:20px;

height:6px;

background:#222;

border-radius:20px;

overflow:hidden;

}

.bar{

height:100%;

width:0%;

background:linear-gradient(90deg,#ff0000,#ff5c5c);

}

.time{

display:flex;

justify-content:space-between;

margin-top:8px;

font-size:12px;

color:#888;

}

.controls{

display:flex;

justify-content:center;

align-items:center;

gap:25px;

margin-top:25px;

}

.ctrl{

width:60px;
height:60px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:#191919;

border:1px solid #333;

cursor:pointer;

transition:.25s;

}

.ctrl:hover{

border-color:var(--red);

box-shadow:0 0 15px rgba(255,0,0,.35);

}

.ctrl span{

font-size:34px;

}

.play{

width:75px;
height:75px;

background:linear-gradient(180deg,#ff3333,#8d0000);

box-shadow:0 0 18px rgba(255,0,0,.35);

}

.searchCard{

margin-top:20px;

background:var(--card);

border:1px solid var(--border);

border-radius:20px;

padding:18px;

}

.searchBox{

display:flex;

gap:10px;

}

.searchBox input{

flex:1;

height:50px;

border:none;

outline:none;

background:#111;

border:1px solid #333;

border-radius:15px;

padding:0 15px;

color:#fff;

}

.searchBox button{

width:60px;

border:none;

border-radius:15px;

background:#ff2020;

color:#fff;

cursor:pointer;

}

.searchBox button span{

font-size:28px;

}

.list{

margin-top:18px;

display:flex;

flex-direction:column;

gap:12px;

}

.musicItem{

display:flex;

align-items:center;

gap:15px;

padding:12px;

border-radius:16px;

background:#181818;

cursor:pointer;

transition:.25s;

}

.musicItem:hover{

border:1px solid #ff3030;

}

.musicItem img{

width:60px;
height:60px;

border-radius:12px;

object-fit:cover;

}

.info{

flex:1;

}

.info h3{

font-size:15px;

}

.info p{

margin-top:4px;

font-size:12px;

color:#999;

}

.eq{

display:flex;

gap:3px;

align-items:flex-end;

height:22px;

}

.eq span{

width:4px;

background:#ff3030;

border-radius:5px;

animation:eq .8s infinite alternate;

}

.eq span:nth-child(2){

animation-delay:.2s;

}

.eq span:nth-child(3){

animation-delay:.4s;

}

@keyframes eq{

from{

height:6px;

}

to{

height:22px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">

DEVONAX MUSIC

</div>

<div class="profile">

<span class="material-symbols-rounded">

music_note

</span>

</div>

</div>

<div class="player">

<div class="cover">

<img id="cover" src="https://placehold.co/400x400/1a1a1a/ffffff?text=DEVONAX">

</div>

<div class="song" id="title">

Tidak ada lagu

</div>

<div class="artist" id="artist">

Cari lagu terlebih dahulu

</div>

<div class="progress">

<div class="bar" id="bar"></div>

</div>

<div class="time">

<span id="currentTime">0:00</span>

<span id="duration">0:00</span>

</div>

<div class="controls">

<div class="ctrl">

<span class="material-symbols-rounded">
skip_previous
</span>

</div>

<div class="ctrl play" id="playBtn">

<span class="material-symbols-rounded" id="playIcon">
play_arrow
</span>

</div>

<div class="ctrl">

<span class="material-symbols-rounded">
skip_next
</span>

</div>

</div>

</div>

<div class="searchCard">

<div class="searchBox">

<input
id="search"
placeholder="Cari lagu...">

<button id="searchBtn">

<span class="material-symbols-rounded">
search
</span>

</button>

</div>

<div class="list" id="musicList"></div>

</div>

<audio id="audio"></audio>

<!-- Bottom Navigation -->

<nav class="bottomNav">

<a id="homeBtn" href="dashboard.html">

<span class="material-symbols-rounded">

home

</span>

<p>Home</p>

</a>

<a href="execution.html">

<span class="material-symbols-rounded">

forum

</span>

<p>Chat</p>

</a>

<a href="tools.html">

<span class="material-symbols-rounded">

construction

</span>

<p>Tools</p>

</a>

<a href="anime.html">

<span class="material-symbols-rounded">

movie

</span>

<p>Anime</p>

</a>

</nav>

<style>

.bottomNav{

position:fixed;

left:15px;
right:15px;
bottom:15px;

height:72px;

background:#111;

border:1px solid #2f2f2f;

border-radius:25px;

display:flex;

justify-content:space-around;

align-items:center;

box-shadow:

0 0 25px rgba(255,0,0,.12);

z-index:999;

backdrop-filter:blur(10px);

}

.bottomNav a{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-decoration:none;

color:#888;

transition:.25s;

}

.bottomNav a.active{

color:#ff3030;

}

.bottomNav a:hover{

color:#ff5050;

}

.bottomNav span{

font-size:30px;

}

.bottomNav p{

margin-top:2px;

font-size:10px;

font-family:Orbitron;

letter-spacing:1px;

}

.musicItem.active{

border:1px solid #ff3030;

box-shadow:

0 0 15px rgba(255,0,0,.25);

}

.loading{

padding:25px;

text-align:center;

color:#888;

font-size:13px;

}

.empty{

padding:25px;

text-align:center;

color:#777;

font-size:13px;

}

</style>

<!-- Popup -->

<div id="popup"

style="

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.55);

backdrop-filter:blur(4px);

justify-content:center;

align-items:center;

z-index:9999;">

<div style="

width:300px;

background:#141414;

border:1px solid #333;

border-radius:22px;

padding:25px;

text-align:center;

">

<span class="material-symbols-rounded"

style="

font-size:60px;

color:#ff3030;">

music_note

</span>

<h3 style="

margin-top:12px;

font-family:Orbitron;">

DEVONAX MUSIC

</h3>

<p id="popupText"

style="

margin-top:10px;

font-size:13px;

color:#999;">

Loading...

</p>

<button

onclick="document.getElementById('popup').style.display='none'"

style="

margin-top:18px;

width:100%;

height:48px;

border:none;

border-radius:14px;

background:#ff2020;

color:#fff;

font-family:Orbitron;

cursor:pointer;">

OK

</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getDatabase,ref,get } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

const audio=document.getElementById("audio");
const list=document.getElementById("musicList");

const cover=document.getElementById("cover");
const title=document.getElementById("title");
const artist=document.getElementById("artist");

const playBtn=document.getElementById("playBtn");
const playIcon=document.getElementById("playIcon");

const bar=document.getElementById("bar");
const current=document.getElementById("currentTime");
const duration=document.getElementById("duration");

let dashboard="dashboard.html";

onAuthStateChanged(auth,async(user)=>{

if(!user){
location.href="login.html";
return;
}

const snap=await get(ref(db,"users/"+user.uid));

if(snap.exists()){

const role=(snap.val().role||"member").toLowerCase();

switch(role){

case "developer":
dashboard="developer/dashboard.html";
break;

case "owner":
dashboard="owner/dashboard.html";
break;

case "admin":
dashboard="admin/dashboard.html";
break;

case "reseller":
dashboard="reseller/dashboard.html";
break;

case "vip":
dashboard="vip/dashboard.html";
break;

default:
dashboard="dashboard.html";

}

document.getElementById("homeBtn").href=dashboard;

}

});

function format(t){

if(isNaN(t)) return "0:00";

const m=Math.floor(t/60);

const s=Math.floor(t%60);

return m+":"+(s<10?"0":"")+s;

}

audio.addEventListener("loadedmetadata",()=>{

duration.textContent=format(audio.duration);

});

audio.addEventListener("timeupdate",()=>{

current.textContent=format(audio.currentTime);

bar.style.width=((audio.currentTime/audio.duration)*100||0)+"%";

});

playBtn.onclick=()=>{

if(!audio.src) return;

if(audio.paused){

audio.play();

playIcon.innerHTML="pause";

}else{

audio.pause();

playIcon.innerHTML="play_arrow";

}

};

audio.onpause=()=>{

playIcon.innerHTML="play_arrow";

};

audio.onplay=()=>{

playIcon.innerHTML="pause";

};

document.getElementById("searchBtn").onclick=searchMusic;

document.getElementById("search").addEventListener("keypress",e=>{

if(e.key==="Enter") searchMusic();

});

async function searchMusic(){

const q=document.getElementById("search").value.trim();

if(!q) return;

list.innerHTML='<div class="loading">Searching...</div>';

try{

const res=await fetch("https://itunes.apple.com/search?term="+encodeURIComponent(q)+"&entity=song&limit=20");

const data=await res.json();

list.innerHTML="";

if(data.results.length===0){

list.innerHTML='<div class="empty">Music not found.</div>';

return;

}

data.results.forEach(item=>{

const div=document.createElement("div");

div.className="musicItem";

div.innerHTML=`

<img src="${item.artworkUrl100.replace("100x100","400x400")}">

<div class="info">

<h3>${item.trackName}</h3>

<p>${item.artistName}</p>

</div>

<div class="eq">

<span></span>

<span></span>

<span></span>

</div>

`;

div.onclick=()=>{

document.querySelectorAll(".musicItem").forEach(e=>e.classList.remove("active"));

div.classList.add("active");

cover.src=item.artworkUrl100.replace("100x100","600x600");

title.textContent=item.trackName;

artist.textContent=item.artistName;

audio.src=item.previewUrl;

audio.play();

};

list.appendChild(div);

});

}catch(e){

list.innerHTML='<div class="empty">Connection failed.</div>';

}

}

window.addEventListener("load",()=>{

search.value="Alan Walker";

searchMusic();

});

</script>

</body>
</html>
