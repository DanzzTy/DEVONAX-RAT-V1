<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX • Create User</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Orbitron,sans-serif;
}

:root{
--bg:#090909;
--card:#151515;
--red:#ff2d2d;
--border:#2f2f2f;
--text:#fff;
}

body{
background:var(--bg);
color:var(--text);
padding:18px;
padding-bottom:90px;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#ff000018,transparent 35%),
radial-gradient(circle at bottom right,#ff000018,transparent 35%);
pointer-events:none;
}

.header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.back{
width:52px;
height:52px;
display:flex;
align-items:center;
justify-content:center;
background:#181818;
border:1px solid #333;
border-radius:18px;
cursor:pointer;
}

.logo{
font-size:24px;
font-weight:800;
letter-spacing:3px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:20px;
margin-bottom:20px;
}

.title{
font-size:15px;
letter-spacing:3px;
color:#ff6666;
margin-bottom:18px;
}

.input{
margin-bottom:16px;
}

.input p{
font-size:12px;
color:#999;
margin-bottom:8px;
}

.input input,
.input select{
width:100%;
height:56px;
background:#1b1b1b;
border:1px solid #333;
border-radius:16px;
padding:0 16px;
color:#fff;
outline:none;
font-size:14px;
}

.input input:focus,
.input select:focus{
border-color:var(--red);
}

.button{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:linear-gradient(180deg,#ff3535,#b40000);
color:#fff;
font-size:15px;
font-weight:700;
cursor:pointer;
}

.button:active{
transform:scale(.98);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.box{
background:#171717;
border:1px solid #333;
border-radius:18px;
padding:18px;
text-align:center;
}

.box span{
font-size:34px;
color:var(--red);
}

.box h2{
margin-top:10px;
font-size:20px;
}

.box p{
margin-top:6px;
font-size:11px;
color:#888;
}

.note{
margin-top:18px;
padding:15px;
background:#181818;
border-radius:16px;
border:1px solid #333;
font-size:12px;
line-height:20px;
color:#aaa;
}

</style>

</head>
<body>

<div class="header">

<div class="back" onclick="location.href='dashboard.html'">

<span class="material-symbols-outlined">

arrow_back

</span>

</div>

<div class="logo">

CREATE USER

</div>

</div>

<div class="card">

<div class="title">

CREATE NEW ACCOUNT

</div>

<div class="input">

<p>Username</p>

<input id="username" placeholder="Masukkan Username">

</div>

<div class="input">

<p>Email</p>

<input id="email" type="email" placeholder="Masukkan Email">

</div>

<div class="input">

<p>Password</p>

<input id="password" type="password" placeholder="Masukkan Password">

</div>

<div class="input">

<p>Role</p>

<select id="role">

<option value="Member">Member</option>

<option value="VIP">VIP</option>

<option value="Admin">Admin</option>

</select>

</div>

<div class="input">

<p>Masa Aktif (Hari)</p>

<input id="days" type="number" placeholder="30">

</div>

<button id="createBtn" class="button">

CREATE USER

</button>

<div class="note">

✓ Reseller hanya dapat membuat akun <b>Member</b>, <b>VIP</b>, dan <b>Admin</b>.<br><br>

✓ Masa aktif dihitung otomatis dari jumlah hari yang dimasukkan.

</div>

</div>

<div class="stats">

<div class="box">

<span class="material-symbols-outlined">

groups

</span>

<h2 id="todayCreate">0</h2>

<p>User Hari Ini</p>

</div>

<div class="box">

<span class="material-symbols-outlined">

verified_user

</span>

<h2>Reseller</h2>

<p>Access</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
get
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

/* =========================
   FIREBASE
========================= */

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

/* =========================
   LOGIN CHECK
========================= */

let currentUser;
let resellerData;

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="../login.html";

return;

}

currentUser=user;

const snap=await get(ref(db,"users/"+user.uid));

if(!snap.exists()){

alert("Data user tidak ditemukan.");

location.href="../login.html";

return;

}

resellerData=snap.val();

if((resellerData.role||"").toLowerCase()!="reseller"){

alert("Halaman hanya untuk Reseller.");

location.href="dashboard.html";

return;

}

loadTodayCreate();

});

/* =========================
   USER HARI INI
========================= */

async function loadTodayCreate(){

const snap=await get(ref(db,"users"));

if(!snap.exists()) return;

let total=0;

const today=new Date().toDateString();

snap.forEach(item=>{

const d=item.val();

if(d.created){

if(new Date(d.created).toDateString()==today){

total++;

}

}

});

document.getElementById("todayCreate").textContent=total;

}

/* =========================
   HITUNG EXPIRED
========================= */

function makeExpired(days){

const t=new Date();

t.setDate(t.getDate()+Number(days));

return t.getTime();

}

/* =========================
   VALIDASI
========================= */

function validateForm(){

const username=document.getElementById("username").value.trim();

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value;

const role=document.getElementById("role").value;

const days=document.getElementById("days").value;

if(username==""){

alert("Username wajib diisi.");

return null;

}

if(email==""){

alert("Email wajib diisi.");

return null;

}

if(password.length<6){

alert("Password minimal 6 karakter.");

return null;

}

if(Number(days)<=0){

alert("Durasi aktif tidak valid.");

return null;

}

return{

username,

email,

password,

role,

days,

expired:makeExpired(days)

};

}

/* =========================
   BUTTON
========================= */

document.getElementById("createBtn").onclick=()=>{

const data=validateForm();

if(!data) return;

console.log(data);

alert("Validasi berhasil.");

};

/* ========================= */

window.db=db;
window.auth=auth;
window.validateForm=validateForm;
window.currentUser=currentUser;

</script>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

const btn=document.getElementById("createBtn");

const loading=document.getElementById("loading");

const passwordInput=document.getElementById("password");
const togglePassword=document.getElementById("togglePassword");

togglePassword.onclick=()=>{

if(passwordInput.type==="password"){

passwordInput.type="text";
togglePassword.textContent="visibility_off";

}else{

passwordInput.type="password";
togglePassword.textContent="visibility";

}

};

btn.onclick=async()=>{

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value;

const username=document.getElementById("username").value.trim();

const role=document.getElementById("role").value;

const expired=document.getElementById("expired").value;

const status=document.getElementById("status").value;

if(!email||!password||!username||!role||!expired){

alert("Lengkapi semua data.");

return;

}

loading.style.display="block";

btn.disabled=true;

try{

const result=await createUserWithEmailAndPassword(

auth,
email,
password

);

const uid=result.user.uid;

await set(ref(db,"users/"+uid),{

uid:uid,

email:email,

username:username,

role:role,

status:status,

expired:expired,

device:"-",

lastLogin:0,

createdAt:Date.now()

});

  showToast("User berhasil dibuat");

  setTimeout(()=>{

location.href="users.html";

},1500);

document.getElementById("email").value="";
document.getElementById("password").value="";
document.getElementById("username").value="";
document.getElementById("role").selectedIndex=0;
document.getElementById("expired").value="";
document.getElementById("status").selectedIndex=0;

loading.textContent="User berhasil dibuat.";

}catch(e){

alert(e.message);

}

loading.style.display="none";

btn.disabled=false;

};

  </script>

<script>

const toast=document.getElementById("toast");

const toastText=document.getElementById("toastText");

function showToast(text){

toastText.textContent=text;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},3000);

}

document.getElementById("email").addEventListener("input",e=>{

e.target.value=e.target.value.replace(/\s/g,"");

});

document.getElementById("username").addEventListener("input",e=>{

e.target.value=e.target.value.replace(/[^a-zA-Z0-9_ ]/g,"");

});

</script>

</body>
</html>
