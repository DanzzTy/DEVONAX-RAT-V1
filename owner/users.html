<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX • Users</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

:root{
--bg:#080808;
--card:#151515;
--card2:#1b1b1b;
--red:#ff2020;
--border:#333;
--text:#fff;
}

body{
background:var(--bg);
color:#fff;
padding:18px;
padding-bottom:100px;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at top left,#ff000018,transparent 35%),
radial-gradient(circle at bottom right,#ff000018,transparent 35%);
}

.grid{
position:fixed;
inset:0;
opacity:.03;
pointer-events:none;
background-image:
linear-gradient(#ff0000 1px,transparent 1px),
linear-gradient(90deg,#ff0000 1px,transparent 1px);
background-size:40px 40px;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.back,
.profile{

width:52px;
height:52px;

display:flex;
justify-content:center;
align-items:center;

border-radius:16px;

background:#151515;
border:1px solid #333;

}

.logo{
font-size:28px;
font-weight:800;
letter-spacing:5px;
}

.banner{

height:170px;

border-radius:24px;

overflow:hidden;

position:relative;

margin-bottom:20px;

border:1px solid #333;

}

.banner img{

width:100%;
height:100%;
object-fit:cover;
filter:brightness(.35);

}

.banner::after{

content:"";

position:absolute;
inset:0;

background:linear-gradient(
transparent,
rgba(0,0,0,.2),
rgba(0,0,0,.9)
);

}

.bannerText{

position:absolute;

left:18px;
bottom:18px;

z-index:2;

}

.bannerText h2{

font-size:26px;
letter-spacing:3px;

}

.bannerText p{

font-size:11px;
color:#ddd;
margin-top:6px;

}

.card{

background:var(--card);

border:1px solid #333;

border-radius:22px;

padding:18px;

margin-bottom:18px;

box-shadow:0 0 15px rgba(255,0,0,.08);

}

.title{

font-size:13px;

letter-spacing:3px;

color:#ff6666;

margin-bottom:15px;

}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:10px;

}

.box{

background:#1b1b1b;

border:1px solid #333;

border-radius:18px;

padding:15px 8px;

text-align:center;

}

.box h2{

font-size:22px;

margin-bottom:6px;

}

.box p{

font-size:10px;

color:#999;

}

.search{

width:100%;

height:55px;

background:#1b1b1b;

border:1px solid #333;

border-radius:16px;

padding:0 16px;

outline:none;

color:#fff;

margin-bottom:14px;

}

.filter{

width:100%;

height:55px;

background:#1b1b1b;

border:1px solid #333;

border-radius:16px;

padding:0 16px;

outline:none;

color:#fff;

}

.userList{

margin-top:18px;

}

.userCard{

background:var(--card2);

border:1px solid #333;

border-radius:22px;

padding:16px;

margin-bottom:15px;

}

.userTop{

display:flex;

align-items:center;

gap:15px;

}

.avatar{

width:60px;
height:60px;

border-radius:50%;

display:flex;

justify-content:center;
align-items:center;

background:linear-gradient(180deg,#ff3030,#700);

flex-shrink:0;

}

.avatar span{

font-size:32px;

}

.info{

flex:1;

}

.info h3{

font-size:17px;

margin-bottom:5px;

}

.email{

font-size:11px;

color:#888;

word-break:break-all;

}

.role{

display:inline-block;

margin-top:10px;

padding:5px 12px;

border-radius:20px;

font-size:10px;

letter-spacing:1px;

background:#2b0000;

border:1px solid #700;

color:#ff8080;

}

.expired{

margin-top:12px;

font-size:11px;

color:#aaa;

}

.actions{

display:flex;

gap:10px;

margin-top:16px;

}

.actions button{

flex:1;

height:46px;

border:none;

border-radius:14px;

font-size:12px;

font-weight:700;

cursor:pointer;

}

.editBtn{

background:#202020;

color:#fff;

border:1px solid #444;

}

.deleteBtn{

background:#8b0000;

color:#fff;

}

.lockBtn{

background:#2d2d2d;

border:1px solid #555;

color:#888;

cursor:not-allowed;

}

</style>

</head>

<body>

<div class="grid"></div>

<header>

<div class="back" onclick="history.back()">

<span class="material-symbols-outlined">
arrow_back
</span>

</div>

<div class="logo">
USERS
</div>

<div class="profile">

<span class="material-symbols-outlined">
groups
</span>

</div>

</header>

<div class="banner">

<img src="img/banner-users.jpg">

<div class="bannerText">

<h2>USER MANAGEMENT</h2>

<p>OWNER CONTROL PANEL</p>

</div>

</div>

<div class="card">

<div class="title">
SYSTEM STATISTICS
</div>

<div class="stats">

<div class="box">
<h2 id="totalUser">0</h2>
<p>TOTAL</p>
</div>

<div class="box">
<h2 id="onlineUser">0</h2>
<p>ONLINE</p>
</div>

<div class="box">
<h2 id="adminUser">0</h2>
<p>ADMIN</p>
</div>

<div class="box">
<h2 id="developerUser">0</h2>
<p>DEV</p>
</div>

</div>

</div>

<div class="card">

<div class="title">
SEARCH USER
</div>

<input
type="text"
id="search"
class="search"
placeholder="Search username...">

<select
id="filter"
class="filter">

<option value="All">Semua Role</option>
<option>Member</option>
<option>VIP</option>
<option>Reseller</option>
<option>Admin</option>
<option>Developer</option>
<option>Owner</option>

</select>

</div>

<div id="userList" class="userList">

<!-- Realtime User -->

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
onValue
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

let users={};

const list=document.getElementById("userList");

const search=document.getElementById("search");

const filter=document.getElementById("filter");

onAuthStateChanged(auth,user=>{

if(!user){

location.replace("../login.html");

return;

}

});

function roleColor(role){

switch((role||"").toLowerCase()){

case "owner":
return "#ff9900";

case "developer":
return "#9b59ff";

case "admin":
return "#ff4444";

case "vip":
return "#ffd54f";

case "reseller":
return "#4fc3f7";

default:
return "#ffffff";

}

}

function render(){

list.innerHTML="";

let total=0;
let admin=0;
let developer=0;
let online=0;

Object.entries(users).forEach(([uid,u])=>{

const nama=(u.username||"").toLowerCase();

const key=search.value.toLowerCase();

if(key && !nama.includes(key)) return;

if(filter.value!="All" && u.role!=filter.value) return;

total++;

if(u.role=="Admin") admin++;

if(u.role=="Developer") developer++;

if(u.online===true) online++;

const protectedRole=
u.role==="Developer"||
u.role==="Owner";

list.innerHTML+=`

<div class="userCard">

<div class="userTop">

<div class="avatar">

<span class="material-symbols-outlined">

person

</span>

</div>

<div class="info">

<h3>${u.username||"-"}</h3>

<div class="email">

${u.email||"-"}

</div>

<div class="role"

style="border-color:${roleColor(u.role)};
color:${roleColor(u.role)};">

${u.role||"Member"}

</div>

<div class="expired">

Expired :
${u.expired||"Unlimited"}

</div>

</div>

</div>

<div class="actions">

${
protectedRole?

`<button class="lockBtn">

🔒 SYSTEM LOCK

</button>

<button class="lockBtn">

PROTECTED

</button>`

:

`<button
class="editBtn"
onclick="editUser('${uid}')">

EDIT

</button>

<button
class="deleteBtn"
onclick="deleteUser('${uid}')">

DELETE

</button>`

}

</div>

</div>

`;

});

document.getElementById("totalUser").textContent=total;

document.getElementById("onlineUser").textContent=online;

document.getElementById("adminUser").textContent=admin;

document.getElementById("developerUser").textContent=developer;

}

onValue(ref(db,"users"),snap=>{

users={};

if(snap.exists()){

snap.forEach(c=>{

users[c.key]=c.val();

});

}

render();

});

search.oninput=render;

filter.onchange=render;

window.editUser=(uid)=>{

sessionStorage.setItem("editUser",uid);

location.href="edit-user.html";

};

</script>

<script type="module">

import {
getDatabase,
ref,
remove
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const db=getDatabase();

window.deleteUser=async(uid)=>{

const data=users[uid];

if(!data) return;

if(
data.role==="Developer"||
data.role==="Owner"
){

alert("Role Developer & Owner dilindungi sistem dan tidak dapat dihapus.");

return;

}

const ok=confirm(
`Hapus akun ${data.username} ?`
);

if(!ok) return;

try{

await remove(ref(db,"users/"+uid));

alert("User berhasil dihapus.");

}catch(err){

alert(err.message);

}

};

</script>

</body>
</html>
