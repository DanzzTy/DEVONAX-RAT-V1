<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Manage Users • DEVONAX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

:root{
--bg:#070707;
--card:#141414;
--red:#ff2020;
--border:#303030;
--text:#fff;
}

body{
background:var(--bg);
color:#fff;
padding:18px 18px 100px;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at top left,#ff000015,transparent 35%),
radial-gradient(circle at bottom right,#ff000015,transparent 35%);
}

.grid{
position:fixed;
inset:0;
opacity:.04;
pointer-events:none;
background-image:
linear-gradient(#ff0000 1px,transparent 1px),
linear-gradient(90deg,#ff0000 1px,transparent 1px);
background-size:40px 40px;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.back{
width:52px;
height:52px;
display:flex;
justify-content:center;
align-items:center;
background:#151515;
border:1px solid #333;
border-radius:16px;
cursor:pointer;
}

.logo{
font-size:28px;
font-weight:800;
letter-spacing:5px;
}

.card{
background:#131313;
border:1px solid #333;
border-radius:22px;
padding:18px;
margin-bottom:18px;
box-shadow:0 0 15px rgba(255,0,0,.08);
}

.title{
font-size:14px;
letter-spacing:3px;
margin-bottom:16px;
color:#ff6666;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.stat{
background:#191919;
border:1px solid #333;
border-radius:16px;
padding:14px;
text-align:center;
}

.stat h2{
font-size:22px;
margin-bottom:6px;
}

.stat p{
font-size:10px;
color:#999;
}

.search{
width:100%;
height:56px;
background:#1b1b1b;
border:1px solid #333;
border-radius:16px;
padding:0 16px;
color:#fff;
outline:none;
margin-bottom:14px;
}

.filter{
width:100%;
height:56px;
background:#1b1b1b;
border:1px solid #333;
border-radius:16px;
padding:0 16px;
color:#fff;
outline:none;
margin-bottom:15px;
}

.userCard{
background:#181818;
border:1px solid #333;
border-radius:20px;
padding:16px;
margin-bottom:14px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.username{
font-size:16px;
font-weight:700;
}

.role{
padding:5px 12px;
border-radius:30px;
font-size:10px;
letter-spacing:1px;
}

.member{background:#222;border:1px solid #444;}
.vip{background:#382600;border:1px solid #8a5b00;color:#ffc44d;}
.reseller{background:#00253a;border:1px solid #006da8;color:#6fd0ff;}
.admin{background:#250000;border:1px solid #8a0000;color:#ff8d8d;}
.owner{background:#3d1b00;border:1px solid #ff9900;color:#ffd35f;}
.developer{background:#26003d;border:1px solid #9a00ff;color:#d49cff;}

.info{
font-size:11px;
line-height:22px;
color:#bbb;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
height:46px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:12px;
font-weight:700;
letter-spacing:1px;
}

.edit{
background:#222;
color:#fff;
border:1px solid #444;
}

.delete{
background:#8b0000;
color:#fff;
}

.protected{
background:#333;
color:#999;
cursor:not-allowed;
}

</style>

</head>

<body>

<div class="grid"></div>

<header>

<div class="back" onclick="history.back()">

<span class="material-symbols-outlined">
arrow_back
</span>

</div>

<div class="logo">
USERS
</div>

<div style="width:52px"></div>

</header>

<div class="card">

<div class="title">
USER STATISTICS
</div>

<div class="stats">

<div class="stat">
<h2 id="totalUser">0</h2>
<p>TOTAL</p>
</div>

<div class="stat">
<h2 id="adminUser">0</h2>
<p>ADMIN</p>
</div>

<div class="stat">
<h2 id="developerUser">0</h2>
<p>DEV</p>
</div>

<div class="stat">
<h2 id="ownerUser">0</h2>
<p>OWNER</p>
</div>

</div>

</div>

<div class="card">

<div class="title">
SEARCH USER
</div>

<input
id="search"
class="search"
type="text"
placeholder="Cari username...">

<select
id="filter"
class="filter">

<option value="All">Semua Role</option>
<option value="Member">Member</option>
<option value="VIP">VIP</option>
<option value="Reseller">Reseller</option>
<option value="Admin">Admin</option>
<option value="Developer">Developer</option>
<option value="Owner">Owner</option>

</select>

</div>

<div id="userList">

<!-- Realtime User -->

  </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

let users={};

onAuthStateChanged(auth,user=>{

if(!user){

location.replace("../login.html");

return;

}

});

const userList=document.getElementById("userList");

const search=document.getElementById("search");

const filter=document.getElementById("filter");

function badge(role){

switch((role||"").toLowerCase()){

case "owner":
return "owner";

case "developer":
return "developer";

case "admin":
return "admin";

case "vip":
return "vip";

case "reseller":
return "reseller";

default:
return "member";

}

}

function render(){

userList.innerHTML="";

let total=0;
let admin=0;
let developer=0;
let owner=0;

Object.entries(users).forEach(([uid,u])=>{

const keyword=search.value.toLowerCase();

if(
keyword &&
!(u.username||"").toLowerCase().includes(keyword)
)return;

if(
filter.value!="All" &&
u.role!=filter.value
)return;

total++;

if(u.role=="Admin") admin++;

if(u.role=="Developer") developer++;

if(u.role=="Owner") owner++;

const protect=
u.role=="Developer"||
u.role=="Owner";

userList.innerHTML+=`

<div class="userCard">

<div class="top">

<div class="username">

${u.username||"-"}

</div>

<div class="role ${badge(u.role)}">

${u.role||"Member"}

</div>

</div>

<div class="info">

Email : ${u.email||"-"}<br>

Expired : ${u.expired||"Unlimited"}

</div>

<div class="actions">

<button
class="btn edit"
onclick="editUser('${uid}')">

EDIT

</button>

${
protect?

`<button
class="btn protected">

PROTECTED

</button>`

:

`<button
class="btn delete"
onclick="hapusUser('${uid}')">

DELETE

</button>`

}

</div>

</div>

`;

});

document.getElementById("totalUser").textContent=total;

document.getElementById("adminUser").textContent=admin;

document.getElementById("developerUser").textContent=developer;

document.getElementById("ownerUser").textContent=owner;

}

onValue(ref(db,"users"),snap=>{

users={};

if(snap.exists()){

snap.forEach(c=>{

users[c.key]=c.val();

});

}

render();

});

search.oninput=render;

filter.onchange=render;

window.hapusUser=async(uid)=>{

const u=users[uid];

if(!u) return;

if(
u.role=="Developer"||
u.role=="Owner"
){

alert("Role ini tidak dapat dihapus.");

return;

}

if(!confirm("Hapus user "+u.username+" ?"))

return;

await remove(ref(db,"users/"+uid));

alert("User berhasil dihapus.");

};

window.editUser=(uid)=>{

sessionStorage.setItem("editUser",uid);

location.href="edit-user.html";

};

</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
getDatabase,
ref,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",
authDomain:"project-coding-gabut.firebaseapp.com",
databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"project-coding-gabut",
storageBucket:"project-coding-gabut.firebasestorage.app",
messagingSenderId:"234910334669",
appId:"1:234910334669:web:5203c9e9ce22a596f2b384"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("userList");

onValue(ref(db,"users"),snap=>{

list.innerHTML="";

if(!snap.exists()){

list.innerHTML="<div class='empty'>Belum ada user.</div>";
return;

}

snap.forEach(item=>{

const uid=item.key;
const u=item.val();

const role=(u.role||"Member");

const protectedRole=
role==="Developer"||
role==="Owner";

list.innerHTML+=`

<div class="userCard">

<div>

<h3>${u.username||"-"}</h3>

<p>${u.email||"-"}</p>

<span class="role">${role}</span>

</div>

<div class="action">

<button
class="edit"
onclick="editUser('${uid}')">

Edit

</button>

${
protectedRole?

`<button class="lock" disabled>
Protected
</button>`

:

`<button
class="delete"
onclick="hapusUser('${uid}')">
Delete
</button>`
}

</div>

</div>

`;

});

});

window.hapusUser=async(uid)=>{

if(!confirm("Hapus user ini?")) return;

try{

await remove(ref(db,"users/"+uid));

alert("User berhasil dihapus.");

}catch(e){

alert(e.message);

}

};

window.editUser=(uid)=>{

location.href="edit-user.html?uid="+uid;

};
</script>

</body>
</html>
