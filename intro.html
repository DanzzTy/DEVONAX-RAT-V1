<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#000;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(
transparent,
rgba(0,0,0,.4),
rgba(0,0,0,.9)
);
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
padding:50px 25px;
}

.logo{
font-size:40px;
letter-spacing:8px;
color:#ff0000;
text-shadow:0 0 20px red;
}

.username{

margin-top:10px;

font-size:18px;

color:#fff;

letter-spacing:3px;

}

.loading{

margin-top:30px;

width:260px;

height:5px;

background:#222;

border-radius:30px;

overflow:hidden;

}

.bar{

height:100%;

width:0;

background:#ff0000;

box-shadow:0 0 20px red;

animation:load 6s linear forwards;

}

@keyframes load{

100%{

width:100%;

}

}

.skip{

position:absolute;

top:25px;

right:25px;

width:110px;

height:42px;

border:1px solid #ff0000;

background:#111;

color:#fff;

border-radius:12px;

letter-spacing:2px;

cursor:pointer;

box-shadow:0 0 15px red;

}

</style>

</head>

<body>

<video id="video" autoplay muted playsinline>

<source src="https://www.image2url.com/r2/default/videos/1784292380435-2936954c-dec2-473b-a3fe-2cfdfc1ecad9.mp4" type="video/mp4">

</video>

<div class="overlay">

<button class="skip" id="skip">

SKIP

</button>

<div class="logo">

DEVONAX

</div>

<div class="username" id="username">

Loading...

</div>

<div class="loading">

<div class="bar"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getDatabase,
ref,
get
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="login.html";

return;

}

const snap=await get(ref(db,"users/"+user.uid));

if(!snap.exists()){

alert("Akun belum diaktifkan");

location.href="login.html";

return;

}

const d=snap.val();

document.getElementById("username").textContent=d.username;

function masuk(){

if(Date.now()>d.expired){

alert("Masa aktif telah habis");

location.href="login.html";

return;

}

if(
d.role=="Developer"||
d.role=="Owner"||
d.role=="Reseller"
){

location.href="admin/dashboard.html";

}else{

location.href="dashboard.html";

}

}

document.getElementById("skip").onclick=masuk;

document.getElementById("video").onended=masuk;

});

document.getElementById("skip").onclick=()=>{

location.href="dashboard.html";

};

document.getElementById("video").onended=()=>{

location.href="dashboard.html";

};

</script>

</body>
</html>
