<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX LOGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#070707;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at top left,#ff000022,transparent 35%),
radial-gradient(circle at bottom right,#ff000022,transparent 35%);
}

.grid{
position:absolute;
inset:0;
opacity:.04;
background-image:
linear-gradient(#ff0000 1px,transparent 1px),
linear-gradient(90deg,#ff0000 1px,transparent 1px);
background-size:40px 40px;
}

.container{
width:100%;
max-width:430px;
padding:25px;
position:relative;
z-index:2;
text-align:center;
}

.logo{
width:90px;
height:90px;
border-radius:22px;
margin:auto;
box-shadow:0 0 30px red;
object-fit:cover;
}

.title{
margin-top:20px;
font-size:44px;
color:#ff0000;
letter-spacing:8px;
text-shadow:0 0 20px red;
}

.sub{
margin-top:8px;
color:#ff5555;
letter-spacing:3px;
font-size:14px;
}

.card{
margin-top:35px;
background:#111;
border-radius:30px;
padding:25px;
border:1px solid #330000;
box-shadow:0 0 35px rgba(255,0,0,.25);
}

.input{
width:100%;
height:58px;
margin-bottom:18px;
background:#180808;
border:1px solid #4a0000;
border-radius:18px;
padding:0 18px;
color:#fff;
font-size:14px;
outline:none;
}

.input:focus{
border-color:red;
box-shadow:0 0 12px red;
}

button{
width:100%;
height:62px;
border:none;
border-radius:18px;
background:#ff0000;
color:white;
font-size:18px;
letter-spacing:4px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px red;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

#status{
margin-top:18px;
color:#ff5555;
font-size:13px;
min-height:18px;
}

.footer{
margin-top:30px;
font-size:12px;
color:#ff5555;
letter-spacing:6px;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="container">

<img src="img/file_000000007a60720897a751a9567ffb6e.png" class="logo">

<div class="title">LOGIN</div>
<div class="sub">Access granted</div>

<div class="card">

<input
id="email"
class="input"
type="email"
placeholder="Username / Email">

<input
id="password"
class="input"
type="password"
placeholder="Password">

<button id="loginBtn">
ACCESS GRANTED
</button>

<div id="status"></div>

</div>

<div class="footer">
// HACK THE PLANET //
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

// Firebase Config
const firebaseConfig = {
apiKey: "AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",
authDomain: "project-coding-gabut.firebaseapp.com",
projectId: "project-coding-gabut",
storageBucket: "project-coding-gabut.firebasestorage.app",
messagingSenderId: "234910334669",
appId: "1:234910334669:web:5203c9e9ce22a596f2b384",
measurementId: "G-PK3SFLJV25"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const btn = document.getElementById("loginBtn");
const status = document.getElementById("status");

btn.onclick = ()=>{

status.innerHTML="Checking account...";

signInWithEmailAndPassword(
auth,
email.value,
password.value
)

.then((userCredential)=>{

status.style.color="#00ff88";
status.innerHTML="Login Success";

setTimeout(()=>{
location.href="intro.html";
},700);

})

.catch((error)=>{

status.style.color="#ff4444";
status.innerHTML=error.message;

});

};

</script>

</body>
  </html>
